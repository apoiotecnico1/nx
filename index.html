<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NOX – Inspeção por Toque no Mapa (Ultra Rápida)</title>
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin>
  <style>
    :root{ --bg:#0b1220; --fg:#e5e7eb; --muted:#94a3b8; --accent:#0ea5e9; --ok:#22c55e; --warn:#f59e0b; --err:#ef4444; --card:#0f172a; --border:#1f2937; --wa:#25D366; }
    @media (prefers-color-scheme: light){ :root{ --bg:#ffffff; --fg:#0f172a; --muted:#64748b; --accent:#0284c7; --ok:#16a34a; --warn:#d97706; --err:#dc2626; --card:#f8fafc; --border:#e2e8f0; } }
    html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,"Helvetica Neue",Arial,"Noto Sans";line-height:1.45;min-height:100vh}
    .appbar{position:sticky;top:0;z-index:20;background:linear-gradient(90deg,var(--accent),#5eead4);color:#fff}
    .appbar-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:.03em}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .select,.input{appearance:none;border:1px solid var(--border);background:var(--bg);color:var(--fg);padding:8px 10px;border-radius:10px;font-weight:700}
    .btn{appearance:none;border:1px solid var(--border);background:color-mix(in srgb,var(--accent) 20%, transparent);color:#fff;padding:10px 12px;border-radius:12px;cursor:pointer;font-weight:800}
    .btn.ok{background:var(--ok);border-color:transparent}
    .btn.warn{background:var(--warn);color:#000;border-color:transparent}
    .btn.err{background:var(--err);border-color:transparent}
    .btn.wa{background:var(--wa);border-color:transparent}

    #map{position:fixed;inset:56px 0 0 0}
    #hint{position:fixed;top:64px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.8);color:#fff;padding:10px 12px;border-radius:999px;font-weight:800;z-index:12;pointer-events:none}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.15)}

    /* Bottom sheet (tap -> confirmação rápida) */
    .sheet{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--border);box-shadow:0 -20px 60px rgba(0,0,0,.25);border-radius:16px 16px 0 0;padding:10px 12px;z-index:30;transform:translateY(110%);transition:transform .25s ease}
    .sheet.open{transform:translateY(0%)}
    .sheet .title{font-weight:900}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:color-mix(in srgb,var(--card) 85%, transparent);font-weight:800}
    .grid{display:grid;gap:10px;grid-template-columns:1fr}
    @media(min-width:720px){.grid{grid-template-columns:1.4fr .6fr}}

    /* Lista de eventos (lado direito em telas largas) */
    #panel{position:fixed;top:56px;right:10px;width:min(400px,95vw);max-height:70vh;overflow:auto;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;box-shadow:0 10px 40px rgba(0,0,0,.25);z-index:15}
    #panel h3{margin:0 0 6px}
    .evt{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;border-bottom:1px dashed var(--border);padding:6px 0}
    .evt .idx{font-weight:900;min-width:28px;text-align:right}
    .evt .id{font-weight:900}
    .evt .km{color:var(--muted);font-size:.88rem}

    /* FABs */
    .fab{position:fixed;right:16px;bottom:16px;z-index:40;display:flex;flex-direction:column;gap:8px}
    .fab .btn{box-shadow:0 10px 30px rgba(0,0,0,.25)}

    /* Pop toast */
    .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 12px;border-radius:8px;z-index:50;opacity:0;transition:opacity .25s}
    .toast.show{opacity:1}
  </style>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <div class="appbar">
    <div class="appbar-inner">
      <div class="brand">NOX · Inspeção por Toque</div>
      <div class="row">
        <label class="badge">Modo: tocar no mapa → gerar ocorrência no ID mais próximo</label>
        <select id="qtyAround" class="select" title="Quantidade de pontos desenhados na tela (apenas visual)">
          <option value="0" selected>Ocultar pontos</option>
          <option value="200">Mostrar 200 próximos</option>
          <option value="500">Mostrar 500 próximos</option>
          <option value="1000">Mostrar 1000 próximos</option>
        </select>
        <select id="snapRadius" class="select" title="Raio de captura do ID mais próximo">
          <option value="30">Raio 30 m</option>
          <option value="50" selected>Raio 50 m</option>
          <option value="80">Raio 80 m</option>
          <option value="120">Raio 120 m</option>
        </select>
        <button id="btnGPSMark" class="btn ok" type="button" title="Marcar pelo GPS (sem tocar no mapa)">Marcar pelo GPS</button>
        <button id="btnCSV" class="btn" type="button">Exportar CSV</button>
      </div>
    </div>
  </div>

  <div id="map" aria-label="Mapa para inspeção por toque"></div>
  <div id="hint">Toque na via (ou use <b>Marcar pelo GPS</b>) · <span class="badge">Segurança primeiro</span></div>

  <div id="panel" hidden>
    <h3>Ocorrências (<span id="evtCount">0</span>)</h3>
    <div id="evtList"></div>
    <div class="row" style="margin-top:6px">
      <button id="btnSendSel" class="btn wa" type="button">Enviar selecionados (WhatsApp)</button>
      <button id="btnSendAll" class="btn wa" type="button">Enviar TODOS (WhatsApp)</button>
      <button id="btnClear" class="btn err" type="button">Limpar</button>
    </div>
  </div>

  <!-- Bottom sheet: confirmação rápida do ponto -->
  <div id="sheet" class="sheet" aria-live="polite" aria-label="Ocorrência rápida">
    <div class="grid">
      <div>
        <div class="title">ID selecionado: <span id="sheetId">—</span></div>
        <div class="row" style="margin-top:6px">
          <span class="pill">Distância: <b id="sheetDist">—</b></span>
          <span class="pill">Pos: <span id="sheetPos">—</span></span>
          <span class="pill">KM: <span id="sheetKm">—</span></span>
        </div>
        <div class="row" style="margin-top:8px">
          <button class="btn err" data-flag="APAGADO">APAGADO</button>
          <button class="btn warn" data-flag="INTERMITENTE">INTERMITENTE</button>
          <button class="btn warn" data-flag="OSCILANTE">OSCILANTE</button>
          <button class="btn ok" data-flag="OK">OK</button>
        </div>
        <div class="row" style="margin-top:6px">
          <input id="noteInput" class="input" placeholder="Observação (opcional)" style="min-width:220px">
        </div>
      </div>
      <div>
        <div class="row" style="justify-content:flex-end">
          <input id="inpPhoto" type="file" accept="image/*;capture=camera" hidden>
          <input id="inpVideo" type="file" accept="video/*;capture=camcorder" hidden>
          <button id="btnPhoto" class="btn ok" type="button" title="Tirar foto (compartilha já)">Foto</button>
          <button id="btnVideo" class="btn warn" type="button" title="Gravar vídeo (compartilha já)">Vídeo</button>
          <button id="btnSave" class="btn primary" type="button">Salvar</button>
          <button id="btnClose" class="btn" type="button">Fechar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- FABs -->
  <div class="fab">
    <button id="btnOpenPanel" class="btn" type="button">Ocorrências</button>
    <button id="fabWhats" class="btn wa" type="button">WhatsApp (Top atual)</button>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite">Salvo</div>

  <script>
    /********* Utils *********/
    const $ = (sel) => document.querySelector(sel);
    const nf0 = new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 0 });
    const nf1 = new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 1 });
    const nfCoord = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 5, maximumFractionDigits: 6 });
    const dtFmt = new Intl.DateTimeFormat('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
    function toast(msg){ const t=$('#toast'); t.textContent=msg||'Ok'; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1200); }
    function escapeHtml(str){ return String(str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;'); }
    function parsePtNumber(v){ if(v===null||v===undefined) return NaN; const s=String(v).trim(); if(!s) return NaN; const normalized=s.replace(/\./g,'').replace(',', '.'); const n=Number(normalized); return Number.isFinite(n)?n:NaN; }
    function haversineMeters(lat1,lon1,lat2,lon2){ const R=6371000; const toRad=(d)=>d*Math.PI/180; const dLat=toRad(lat2-lat1); const dLon=toRad(lon2-lon1); const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2; const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); return R*c; }

    /********* Estado *********/
    let map, userMarker; let dataset=[]; // {id, lat, lon, endereco?, plaqueta?}
    let grid={};// spatial buckets {key:[idx,...]}
    const GRID_DEG = 0.0005; // ~55m lat — bom p/ 30m entre postes; ajustado via raio
    let lastGPS=null; let evtStore=[]; // {seq,id,status,note,ts,lat,lon,kmText,dist}

    try{ evtStore = JSON.parse(localStorage.getItem('nox_tap_inspecao_v1')||'[]'); }catch{ evtStore=[]; }

    /********* Mapa *********/
    function initMap(){ map = L.map('map'); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '' }).addTo(map); map.setView([-22.75, -45.3], 12); map.on('click', onMapClick); if(navigator.geolocation){ navigator.geolocation.watchPosition((p)=>{ const {latitude,longitude}=p.coords; lastGPS={lat:latitude,lon:longitude,acc:p.coords.accuracy}; if(!userMarker){ userMarker=L.marker([latitude,longitude],{opacity:0.8}).addTo(map); } else { userMarker.setLatLng([latitude,longitude]); } },()=>{}, {enableHighAccuracy:true, maximumAge:2000, timeout:10000}); }
    }

    /********* CSV loader *********/
    async function loadCSV(path){ const resp=await fetch(path,{cache:'no-store'}); if(!resp.ok) throw 0; const text=await resp.text(); const parsed=Papa.parse(text,{header:true,delimiter:';',skipEmptyLines:'greedy',dynamicTyping:false}); if(parsed.errors && parsed.errors.length){ throw new Error(parsed.errors[0].message||'Falha CSV'); } return parsed; }

    async function carregarDados(){ const paths=['./dados.csv','./Dados_Completos_Grupo_2_all.csv']; for(const p of paths){ try{ const parsed=await loadCSV(p); const fields=parsed.meta?.fields||[]; const pick=(c)=>{ const lc=fields.map(f=>f?String(f).toLowerCase().trim():''); for(const x of c){ const i=lc.indexOf(x); if(i>=0) return fields[i]; } return null; };
      const latKey=pick(['latitude','lat']); const lonKey=pick(['longitude','lon','long']); const idKey=(()=>{ const lc=fields.map(f=>f?String(f).toLowerCase().trim():''); let i=lc.indexOf('id do nox'); if(i>=0) return fields[i]; i=lc.indexOf('idnox'); if(i>=0) return fields[i]; i=lc.indexOf('id'); if(i>=0) return fields[i]; return null; })(); const endKey=pick(['endereco','endereço']); const plaquetaKey=pick(['plaqueta']); if(!latKey||!lonKey||!idKey) throw new Error('Colunas latitude/longitude/ID não encontradas.');
      dataset = parsed.data.map((row)=>({ id:(row[idKey]===undefined||row[idKey]===null||String(row[idKey]).trim()==='')?'Sem ID':String(row[idKey]).trim(), lat:parsePtNumber(row[latKey]), lon:parsePtNumber(row[lonKey]), endereco:endKey? String(row[endKey]??'').trim():undefined, plaqueta: plaquetaKey? String(row[plaquetaKey]??'').trim():undefined }))
                  .filter(p=>Number.isFinite(p.lat)&&Number.isFinite(p.lon));
      buildGrid(); drawAround(); break; }catch(_){ /* tenta próximo */ } }
      renderPanel(); }

    /********* Grid + nearest *********/
    function keyFor(lat,lon){ const gx=Math.floor(lon/GRID_DEG), gy=Math.floor(lat/GRID_DEG); return gx+','+gy; }
    function buildGrid(){ grid={}; dataset.forEach((p,idx)=>{ const k=keyFor(p.lat,p.lon); if(!grid[k]) grid[k]=[]; grid[k].push(idx); }); }
    function nearest(lat,lon,maxDist=50){ const gx=Math.floor(lon/GRID_DEG), gy=Math.floor(lat/GRID_DEG); let best=null; let bd=Infinity; const cells=[]; for(let dx=-1;dx<=1;dx++){ for(let dy=-1;dy<=1;dy++){ cells.push((gx+dx)+','+(gy+dy)); } }
      for(const k of cells){ const arr=grid[k]; if(!arr) continue; for(const idx of arr){ const p=dataset[idx]; const d=haversineMeters(lat,lon,p.lat,p.lon); if(d<bd){ bd=d; best=p; } } }
      if(!best || bd>maxDist) return null; return {pt:best, dist:bd}; }

    /********* KM offline opcional *********/
    let kmdb=[]; // {km,lat,lon,rodovia}
    async function carregarKM(){ const paths=['./km_eixos.csv','./eixos.csv']; for(const p of paths){ try{ const parsed=await loadCSV(p); const fields=parsed.meta?.fields||[]; const pick=(c)=>{ const lc=fields.map(f=>f?String(f).toLowerCase().trim():''); for(const x of c){ const i=lc.indexOf(x); if(i>=0) return fields[i]; } return null; };
      const kmK=pick(['km','quilometro','quilômetro']); const latK=pick(['latitude','lat']); const lonK=pick(['longitude','lon','long']); const rodK=pick(['rodovia','br','via']); if(!kmK||!latK||!lonK) continue; kmdb = parsed.data.map(r=>({ km:parsePtNumber(r[kmK]), lat:parsePtNumber(r[latK]), lon:parsePtNumber(r[lonK]), rodovia: r[rodK]? String(r[rodK]).trim():undefined })).filter(x=>Number.isFinite(x.km)&&Number.isFinite(x.lat)&&Number.isFinite(x.lon)); break; }catch(_){ } }
    }
    function nearestKmText(lat,lon){ if(!kmdb||kmdb.length===0) return '—'; let best=null; let bd=Infinity; for(const k of kmdb){ const d=haversineMeters(lat,lon,k.lat,k.lon); if(d<bd){ bd=d; best=k; } } if(!best) return '—'; return (best.rodovia? (best.rodovia+' '):'') + 'km ' + (Number.isFinite(best.km)? best.km.toFixed(3):'—') + ` (${nf0.format(bd)} m)`; }

    /********* Visual – desenhar próximos (opcional) *********/
    let aroundLayer=null;
    function drawAround(){ const n=Number($('#qtyAround')?.value||0); if(!map||!dataset||dataset.length===0) return; if(aroundLayer){ aroundLayer.remove(); aroundLayer=null; }
      if(n<=0){ return; }
      let baseLatLon = lastGPS? [lastGPS.lat,lastGPS.lon] : map.getCenter();
      // ordena por distância (rápido: varre e guarda top n)
      const withD = dataset.map(p=>({p, d: lastGPS? haversineMeters(baseLatLon[0],baseLatLon[1],p.lat,p.lon): 0 }));
      withD.sort((a,b)=>a.d-b.d); const take = withD.slice(0, Math.min(n, withD.length));
      aroundLayer = L.layerGroup(take.map(o=> L.circleMarker([o.p.lat,o.p.lon], {radius:3, color:'#38bdf8', weight:1, opacity:0.9, fillOpacity:0.6}).bindTooltip(o.p.id) ));
      aroundLayer.addTo(map);
    }

    /********* Interação *********/
    let lastClick=null; // {lat,lon, id?, dist?, kmText?}
    function onMapClick(e){ const lat=e.latlng.lat, lon=e.latlng.lng; openSheetFor(lat,lon); }

    function openSheetFor(lat,lon){ const maxDist=Number($('#snapRadius')?.value||50); const near=nearest(lat,lon,maxDist); const sheet=$('#sheet'); if(!near){ $('#sheetId').textContent='—'; $('#sheetDist').textContent='> '+maxDist+' m'; $('#sheetPos').textContent=nfCoord.format(lat)+', '+nfCoord.format(lon); $('#sheetKm').textContent='—'; sheet.classList.add('open'); lastClick={lat,lon,id:null,dist:null,kmText:'—'}; return; }
      $('#sheetId').textContent=near.pt.id; $('#sheetDist').textContent=nf0.format(near.dist)+' m'; $('#sheetPos').textContent=nfCoord.format(lat)+', '+nfCoord.format(lon); const kmT = nearestKmText(lat,lon); $('#sheetKm').textContent=kmT; lastClick={lat,lon,id:near.pt.id,dist:near.dist,kmText:kmT}; sheet.classList.add('open'); }

    function closeSheet(){ $('#sheet').classList.remove('open'); }

    // salvar ocorrência
    function saveOccurrence(status, note){ if(!lastClick){ toast('Toque no mapa primeiro'); return; } const id = lastClick.id || 'Sem ID'; const ts = new Date().toISOString(); const rec={ seq: evtStore.length+1, id, status: status||'OK', note: String(note||'').trim(), ts, lat:lastClick.lat, lon:lastClick.lon, kmText:lastClick.kmText, dist:lastClick.dist };
      evtStore.push(rec); localStorage.setItem('nox_tap_inspecao_v1', JSON.stringify(evtStore)); renderPanel(); toast('Salvo'); }

    function renderPanel(){ const box=$('#panel'); const list=$('#evtList'); const cnt=$('#evtCount'); cnt.textContent=String(evtStore.length); list.innerHTML=''; if(evtStore.length>0) box.hidden=false; evtStore.forEach((r,i)=>{ const div=document.createElement('div'); div.className='evt';
        const cb=document.createElement('input'); cb.type='checkbox'; cb.dataset.idx=String(i);
        const idx=document.createElement('div'); idx.className='idx'; idx.textContent=String(r.seq);
        const detail=document.createElement('div'); detail.innerHTML = `<div class="id">${escapeHtml(r.id)} — <b>${escapeHtml(r.status)}</b></div><div class="km">${escapeHtml(r.kmText||'—')} · ${nfCoord.format(r.lat)}, ${nfCoord.format(r.lon)} · ${dtFmt.format(new Date(r.ts))}</div>`;
        const del=document.createElement('button'); del.className='btn'; del.textContent='Remover'; del.addEventListener('click',()=>{ evtStore.splice(i,1); localStorage.setItem('nox_tap_inspecao_v1', JSON.stringify(evtStore)); renderPanel(); });
        div.appendChild(cb); div.appendChild(idx); div.appendChild(detail); div.appendChild(del); list.appendChild(div); });
    }

    /********* WhatsApp e CSV *********/
    function buildHeader(){ const now=new Date(); const dataHora=dtFmt.format(now); const gps= lastGPS? `${nfCoord.format(lastGPS.lat)}, ${nfCoord.format(lastGPS.lon)}` : '—'; return `--- INSPEÇÃO (TOQUE) NOX ---\nData/Hora: ${dataHora}\nPosição atual: ${gps}\n-----------------------\n`; }
    function openWA(msg){ const url='https://wa.me/?text='+encodeURIComponent(msg); window.open(url,'_blank','noopener,noreferrer'); }

    function sendSelected(all=false){ if(evtStore.length===0){ alert('Sem ocorrências.'); return; } let rows=[]; if(all){ rows=evtStore; } else { const cbs=Array.from(document.querySelectorAll('#evtList input[type="checkbox"]')); const idxs=cbs.filter(cb=>cb.checked).map(cb=>Number(cb.dataset.idx)); if(idxs.length===0){ alert('Selecione itens.'); return; } rows = idxs.map(i=>evtStore[i]); }
      let msg = buildHeader() + 'Ocorrências:\n'; rows.forEach(r=>{ const dh=dtFmt.format(new Date(r.ts)); const pos=`${nfCoord.format(r.lat)}, ${nfCoord.format(r.lon)}`; const note=r.note? ` — obs: ${r.note}`:''; msg += `${r.seq}. ${r.id} — ${r.status}${note} — ${r.kmText||'—'} — ${pos} — ${dh}\n`; });
      openWA(msg);
    }

    function exportCSV(){ if(evtStore.length===0){ alert('Nada a exportar.'); return; } const head='Seq;ID;Status;Obs;DataHora;Latitude;Longitude;KM;Dist(m)\n'; const lines=evtStore.map(r=>[r.seq,r.id,(r.status||'').replaceAll(';',','),(r.note||'').replaceAll(';',','),(()=>{try{return dtFmt.format(new Date(r.ts));}catch{return r.ts;}})(), r.lat??'', r.lon??'', r.kmText??'', r.dist!=null? Math.round(r.dist):'' ].join(';')).join('\n'); const blob = new Blob([head+lines], {type:'text/csv;charset=utf-8;'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='inspecao_toque_nox.csv'; document.body.appendChild(a); a.click(); setTimeout(()=>{document.body.removeChild(a); URL.revokeObjectURL(url);},300); }

    /********* Mídia (compartilhar imediatamente) *********/
    function shareFileWithHeader(file){ const header = buildHeader(); if(navigator.canShare && navigator.canShare({ files:[file] })){ navigator.share({ files:[file], title:'Inspeção NOX (toque)', text: header }).catch(()=>{}); } else { openWA(header+'(Anexe a mídia em seguida)'); alert('Seu navegador não suporta compartilhamento direto de arquivos. O WhatsApp será aberto com o texto; anexe a mídia manualmente.'); } }

    /********* Boot *********/
    document.addEventListener('DOMContentLoaded', async ()=>{
      initMap(); await carregarDados(); await carregarKM();

      // Controles
      $('#btnOpenPanel').addEventListener('click',()=>{ $('#panel').hidden=!$('#panel').hidden; });
      $('#btnCSV').addEventListener('click', exportCSV);
      $('#btnSendSel').addEventListener('click', ()=>sendSelected(false));
      $('#btnSendAll').addEventListener('click', ()=>sendSelected(true));
      $('#btnClear').addEventListener('click', ()=>{ if(!confirm('Limpar todas as ocorrências?')) return; evtStore=[]; localStorage.setItem('nox_tap_inspecao_v1', JSON.stringify(evtStore)); renderPanel(); });
      $('#qtyAround').addEventListener('change', drawAround);
      $('#snapRadius').addEventListener('change', ()=>{});
      $('#fabWhats').addEventListener('click', ()=>{ if(!dataset||dataset.length===0||!lastGPS){ alert('Aguardando dados/GPS…'); return; } // envia Top 10 por proximidade atual
        const withD = dataset.map(p=>({id:p.id, d: haversineMeters(lastGPS.lat,lastGPS.lon,p.lat,p.lon)})).sort((a,b)=>a.d-b.d).slice(0,10); let msg=buildHeader()+'IDs próximos (Top 10):\n'; withD.forEach((x,i)=> msg += `${i+1}. ${x.id} — ${nf0.format(x.d)} m\n`); openWA(msg); });
      $('#btnGPSMark').addEventListener('click', ()=>{ if(!lastGPS){ alert('Aguardando GPS…'); return; } openSheetFor(lastGPS.lat,lastGPS.lon); });

      // Sheet actions
      document.querySelectorAll('.sheet [data-flag]').forEach(btn=> btn.addEventListener('click', ()=>{ const note=$('#noteInput').value||''; saveOccurrence(btn.dataset.flag, note); $('#noteInput').value=''; closeSheet(); }));
      $('#btnSave').addEventListener('click', ()=>{ const note=$('#noteInput').value||''; saveOccurrence('OK', note); $('#noteInput').value=''; closeSheet(); });
      $('#btnClose').addEventListener('click', closeSheet);

      // Mídia
      $('#btnPhoto').addEventListener('click', ()=>$('#inpPhoto').click());
      $('#btnVideo').addEventListener('click', ()=>$('#inpVideo').click());
      $('#inpPhoto').addEventListener('change', (e)=>{ const f=e.target.files&&e.target.files[0]; if(!f) return; shareFileWithHeader(f); e.target.value=''; });
      $('#inpVideo').addEventListener('change', (e)=>{ const f=e.target.files&&e.target.files[0]; if(!f) return; shareFileWithHeader(f); e.target.value=''; });

      renderPanel();
    });
  </script>
</body>
</html>
