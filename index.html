<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>IDs</title>
<meta name="theme-color" content="#0b1220" />
<style>
  :root{
    --bg:#0b1220; --fg:#fff; --muted:#9ca3b8;
    --card:#0f172a; --border:#1f2937; --accent:#0ea5e9; --wa:#25D366;
    --ok:#16a34a; --warn:#f59e0b; --bad:#ef4444;
  }
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--fg);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:14px
  }

  /* Chip de status do GPS */
  .chip{
    display:inline-flex; align-items:center; gap:10px;
    border:1px solid var(--border); background:var(--card); color:var(--muted);
    padding:10px 12px; border-radius:999px; font-weight:800; user-select:none
  }
  .dot{width:10px; height:10px; border-radius:50%}
  .ok .dot{ background:var(--ok) }     .ok{ color:#cde8d4 }
  .warn .dot{ background:var(--warn) } .warn{ color:#ffe7bf }
  .bad .dot{ background:var(--bad) }   .bad{ color:#ffc7c7 }

  /* Lista de IDs */
  ul{margin:0; padding:0; list-style:none; display:grid; gap:6px; width:min(840px,94vw)}
  li{
    line-height:1.25; font-family:ui-monospace,Consolas,Menlo,monospace;
    border:1px solid var(--border); border-radius:10px; padding:10px 12px; background:var(--card);
  }
  /* Destaca o mais próximo */
  li:first-child{ border-color:#34d399 }

  /* Botão Enviar (só aparece com GPS verde) */
  #btnWA{
    display:none; padding:14px 18px; font-size:1rem; font-weight:800;
    border:0; border-radius:12px; color:#fff; background:var(--wa); cursor:pointer
  }
</style>
</head>
<body>

  <!-- Status de GPS (verde/amarelo/vermelho) -->
  <div id="gpsChip" class="chip bad" aria-live="polite">
    <span class="dot"></span><span id="gpsText">GPS: aguardando…</span>
  </div>

  <!-- Lista dos 10 IDs mais próximos -->
  <ul id="list" aria-live="polite" aria-label="IDs mais próximos"></ul>

  <!-- Enviar (só aparece quando GPS estiver VERDE/OK) -->
  <button id="btnWA">Enviar</button>

<script>
/* =================== Configuração =================== */
/* Precisão: só VERDE (OK) habilita o envio */
const ACC_GREEN = 10;   // metros (precisão máxima)
const ACC_YELLOW = 25;  // metros (intermediário)

/* =================== Estado =================== */
let dataset = [];          // {id, lat, lon}
let lastPos = null;        // {lat, lon, acc}
let lastRender = 0;        // throttle

/* =================== Utilitários =================== */
function parsePt(v){
  if(v==null) return NaN;
  return Number(String(v).trim().replace(/\./g,'').replace(',', '.'));
}
function hav(a,b,c,d){
  const R=6371000, x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180;
  const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
  return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u));
}
function nearestN(lat, lon, n=10){
  if(!dataset.length) return [];
  const arr = dataset.map(p=>({id:p.id, d:hav(lat,lon,p.lat,p.lon)}));
  arr.sort((a,b)=>a.d-b.d);
  return arr.slice(0, Math.min(n, arr.length));
}

/* =================== UI: GPS Chip & Botão =================== */
const gpsChip = document.getElementById('gpsChip');
const gpsText = document.getElementById('gpsText');
const btnWA   = document.getElementById('btnWA');

function updateGpsChip(){
  if(!lastPos || lastPos.acc==null){
    gpsChip.classList.remove('ok','warn'); gpsChip.classList.add('bad');
    gpsText.textContent = 'GPS: buscando…';
    btnWA.style.display = 'none';
    return;
  }
  const acc = Math.round(lastPos.acc);
  if(acc <= ACC_GREEN){
    gpsChip.classList.remove('warn','bad'); gpsChip.classList.add('ok');
    gpsText.textContent = `GPS: OK (±${acc} m)`;
    // Só aparece se há base e posição
    btnWA.style.display = (dataset.length && lastPos) ? 'inline-block' : 'none';
  }else if(acc <= ACC_YELLOW){
    gpsChip.classList.remove('ok','bad'); gpsChip.classList.add('warn');
    gpsText.textContent = `GPS: ajustando (±${acc} m)`;
    btnWA.style.display = 'none';
  }else{
    gpsChip.classList.remove('ok','warn'); gpsChip.classList.add('bad');
    gpsText.textContent = `GPS: fraco (±${acc} m)`;
    btnWA.style.display = 'none';
  }
}

/* =================== Carregar CSV =================== */
async function loadCSV(){
  try{
    // 1) dados.csv; 2) Dados_Completos_Grupo_2_all.csv
    let resp = await fetch('dados.csv', {cache:'no-store'});
    if(!resp.ok){ resp = await fetch('Dados_Completos_Grupo_2_all.csv', {cache:'no-store'}); }
    if(!resp.ok) return;

    const text = await resp.text();
    const lines = text.split(/\r?\n/).filter(l=>l.trim()!=='');
    if(lines.length<2) return;

    const head = lines.shift().split(';').map(h=>h.trim().toLowerCase());
    const iLat = head.indexOf('latitude');
    const iLon = head.indexOf('longitude');
    let iId = head.indexOf('id do nox'); if(iId<0) iId=head.indexOf('idnox'); if(iId<0) iId=head.indexOf('id');
    if(iLat<0 || iLon<0 || iId<0) return;

    dataset = lines.map(l=>{
      const r = l.split(';');
      return { id:String(r[iId]||'').trim()||'Sem ID', lat:parsePt(r[iLat]), lon:parsePt(r[iLon]) };
    }).filter(p => Number.isFinite(p.lat) && Number.isFinite(p.lon));

    render(true);
    updateGpsChip();
  }catch(e){ /* silencioso */ }
}

/* =================== Render da lista =================== */
function render(force=false){
  const now = performance.now();
  if(!force && now - lastRender < 200) return;
  lastRender = now;

  const ul = document.getElementById('list');
  ul.innerHTML = '';
  if(!lastPos || !dataset.length) return;

  const items = nearestN(lastPos.lat, lastPos.lon, 10);
  items.forEach((o, idx)=>{
    const li = document.createElement('li');
    li.textContent = o.id;
    if(idx===0) li.style.borderColor = '#34d399'; // destaque do mais próximo
    ul.appendChild(li);
  });
}

/* =================== GPS =================== */
function startGPS(){
  if(!('geolocation' in navigator)) return;
  navigator.geolocation.watchPosition(pos=>{
    lastPos = { lat:pos.coords.latitude, lon:pos.coords.longitude, acc:pos.coords.accuracy };
    render();
    updateGpsChip();  // controla o “verde/OK” e o botão
  }, ()=>{}, { enableHighAccuracy:true, maximumAge:0, timeout:15000 });
}

/* =================== Envio WhatsApp =================== */
btnWA.addEventListener('click', ()=>{
  if(!lastPos || !dataset.length) return;
  // Somente é exibido quando “verde”, mas validamos por segurança
  if(!(gpsChip.classList.contains('ok'))) return;

  const items = nearestN(lastPos.lat, lastPos.lon, 10);
  if(!items.length) return;

  let tx = '';
  items.forEach(o => tx += `ID: ${o.id}\n`); // apenas “ID: xxxx”
  window.open('https://wa.me/?text='+encodeURIComponent(tx),'_blank');
});

/* =================== Boot =================== */
(function boot(){
  loadCSV();
  startGPS();
})();
</script>
</body>
</html>
