<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ID GPS · IDs Próximos</title>
<meta name="theme-color" content="#ffffff" />
<style>
  :root{
    --bg:#f8fafc; --fg:#0f172a; --muted:#475569; --border:#e5e7eb; --surface:#ffffff;
    --accent:#2563eb; --accent-2:#22c55e; --ok:#16a34a; --warn:#f59e0b; --bad:#ef4444;
    --btn:#22c55e; --btn-alt:#2563eb; --focus:#3b82f6; --shadow:0 6px 20px rgba(15,23,42,.06); --radius:14px;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;line-height:1.35;-webkit-font-smoothing:antialiased}

  header{padding:14px 16px}
  .brand{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:10px}
  .dot-logo{width:10px;height:10px;border-radius:50%;background:linear-gradient(90deg,var(--accent),var(--accent-2))}
  .brand h1{margin:0;font-size:clamp(.95rem,1.6vw,1.05rem);font-weight:900;letter-spacing:.08em;color:var(--muted)}

  #status{max-width:1100px;margin:6px auto 0;display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:0 16px}
  .chip,.badge{display:inline-flex;align-items:center;gap:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);padding:10px 12px;border-radius:999px;font-weight:800;box-shadow:var(--shadow)}
  .dot{width:10px;height:10px;border-radius:50%}
  .ok .dot{background:var(--ok)} .ok{color:#065f46}
  .warn .dot{background:var(--warn)} .warn{color:#7c4a00}
  .bad .dot{background:var(--bad)} .bad{color:#7f1d1d}
  .badge{color:#1e293b}

  main{max-width:1100px;margin:12px auto 24px;display:grid;gap:16px;padding:0 16px}
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
  .card h2{margin:0 0 12px 0;font-size:clamp(1.05rem,1.8vw,1.1rem);color:#0b1220}

  .actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  button{padding:14px 18px;font-size:clamp(.95rem,1.6vw,1.02rem);font-weight:900;border:0;border-radius:12px;color:#ffffff;cursor:pointer;transition:transform .08s ease, filter .15s ease;box-shadow:var(--shadow)}
  button:active{transform:translateY(1px)}
  button:hover{filter:brightness(1.03)}
  button:disabled{opacity:.55;cursor:not-allowed;filter:none}
  #btnSend{background:var(--btn)}
  #btnSendNew{background:var(--btn-alt)}
  .opt{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:.95rem}
  .opt input{width:16px;height:16px;accent-color:var(--accent)}

  .field{display:flex;flex-direction:column;gap:6px}
  .field label{color:#0f172a;font-weight:800;font-size:.95rem}
  .field input{padding:12px;border-radius:12px;border:1px solid var(--border);background:#ffffff;color:#0f172a;font-size:1rem;outline:2px solid transparent;transition:outline-color .15s ease, box-shadow .15s ease}
  .field input:focus{outline:2px solid var(--focus);outline-offset:2px;box-shadow:0 0 0 4px rgba(59,130,246,.15)}

  ul{margin:0;padding:0;list-style:none;display:grid;gap:8px}
  li{line-height:1.3;font-family:ui-monospace,Consolas,Menlo,monospace;border:1px solid var(--border);border-radius:12px;padding:12px;background:#ffffff;font-size:1.03rem;color:#0b1220}
  li:first-child{border-color:#22c55e}
  .skeleton{height:48px;border-radius:12px;background:linear-gradient(90deg,#e5e7eb 25%,#f1f5f9 40%,#e5e7eb 60%);background-size:200% 100%;animation:shimmer 1.1s infinite}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  .fine{display:grid;grid-template-columns:auto auto;gap:8px;align-items:center;margin-top:12px}
  .pad{display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(3,44px);gap:6px;justify-content:start}
  .pad button{background:#e2e8f0;color:#0f172a;border:1px solid #d1d5db;border-radius:10px;box-shadow:none}
  .pad .sp{visibility:hidden}
  .fine .meta{font-size:.92rem;color:#334155}
  .step{display:flex;align-items:center;gap:8px;color:#334155}
  select{padding:10px;border-radius:10px;border:1px solid var(--border);background:#fff;color:#0f172a}

  .col-4{grid-column:span 4}
  .col-8{grid-column:span 8}
  @media (max-width:900px){ .col-4,.col-8{grid-column:1/-1} }

  button:focus-visible, select:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
</style>
</head>
<body>

<header>
  <div class="brand"><span class="dot-logo" aria-hidden="true"></span><h1>ID GPS</h1></div>
</header>

<div id="status" role="region" aria-label="Status do sistema">
  <div id="gpsChip" class="chip bad" aria-live="polite"><span class="dot"></span><span id="gpsText">GPS: aguardando…</span></div>
  <div id="diag" class="badge" style="display:none" aria-live="polite">—</div>
</div>

<main>
  <div class="grid">
    <!-- Ações -->
    <section class="card col-4" aria-label="Ações">
      <h2>Ações</h2>

      <div class="actions" style="margin-bottom:12px">
        <button id="btnSend" disabled>Enviar ID por WhatsApp</button>
        <label class="opt" title="Adicionar links do Google Maps no texto de IDs">
          <input type="checkbox" id="chkMaps" />
          <span>incluir links de mapa</span>
        </label>
      </div>

      <!-- Ponto sem cadastro -->
      <div class="field" style="margin-top:6px">
        <label for="obs">Observação (ponto sem cadastro, opcional)</label>
        <input id="obs" type="text" placeholder="Ex.: Poste novo no canteiro central" />
      </div>

      <!-- Ajuste fino do ponto (em metros) -->
      <div class="fine" aria-label="Ajuste fino do ponto">
        <div class="pad">
          <span class="sp"></span>
          <button type="button" id="btnN" title="Norte (+N)">↑</button>
          <span class="sp"></span>

          <button type="button" id="btnW" title="Oeste (-E)">←</button>
          <button type="button" id="btnReset" title="Zerar ajuste">•</button>
          <button type="button" id="btnE" title="Leste (+E)">→</button>

          <span class="sp"></span>
          <button type="button" id="btnS" title="Sul (-N)">↓</button>
          <span class="sp"></span>
        </div>
        <div class="meta">
          <div id="ajusteInfo">Ajuste: ΔN 0 m, ΔE 0 m</div>
          <div id="coordInfo">Lat —, Lon —</div>
          <label class="step">Passo:
            <select id="step">
              <option value="1">1 m</option>
              <option value="3" selected>3 m</option>
              <option value="5">5 m</option>
              <option value="10">10 m</option>
            </select>
          </label>
          <label class="opt" style="margin-top:6px">
            <input type="checkbox" id="chkNearest" checked />
            <span>citar ID mais próximo no envio</span>
          </label>
        </div>
      </div>

      <div class="actions" style="margin-top:12px">
        <button id="btnSendNew" disabled>Enviar localização (sem cadastro)</button>
      </div>
    </section>

    <!-- IDs próximos -->
    <section class="card col-8" aria-label="IDs mais próximos">
      <h2>IDs próximos</h2>
      <ul id="list" aria-live="polite">
        <li class="skeleton"></li><li class="skeleton"></li><li class="skeleton"></li>
        <li class="skeleton"></li><li class="skeleton"></li>
      </ul>
    </section>
  </div>
</main>

<script>
/* ===== Chip (visual) ===== */
const ACC_GREEN=10, ACC_YELLOW=25;

/* ===== Estado ===== */
let dataset=[];                 // {id,lat,lon}
let lastPos=null;               // {lat,lon,acc,spd,head,ts}
let lastRender=0;
/* Ajuste manual (em metros): +N / +E */
let dN=0, dE=0;

/* ===== Elements ===== */
const gpsChip=document.getElementById('gpsChip');
const gpsText=document.getElementById('gpsText');
const diag=document.getElementById('diag');
const btnSend=document.getElementById('btnSend');
const btnSendNew=document.getElementById('btnSendNew');
const chkMaps=document.getElementById('chkMaps');
const chkNearest=document.getElementById('chkNearest');
const listEl=document.getElementById('list');
const obsInput=document.getElementById('obs');
const stepSel=document.getElementById('step');
const ajusteInfo=document.getElementById('ajusteInfo');
const coordInfo=document.getElementById('coordInfo');

/* ===== Helpers ===== */
function showDiag(msg){ diag.style.display='inline-flex'; diag.textContent=msg; }
function normalizeStr(s){ return String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9_ ]+/g,' ').replace(/\s+/g,' '); }
function findColumnIndex(headers, candidates){
  const map=headers.map(h=>normalizeStr(h));
  for(const c of candidates){ const i=map.indexOf(c); if(i>=0) return i; }
  for(const c of candidates){ for(let i=0;i<map.length;i++){ if(map[i].includes(c)) return i; } }
  return -1;
}
function parsePt(v){ if(v==null) return NaN; const s=String(v).trim(); return /,\d{1,}$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); }
function hav(a,b,c,d){ const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180; const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); }
function nearestN(lat,lon,n=10){ if(!dataset.length) return []; const arr=dataset.map(p=>({id:p.id,lat:p.lat,lon:p.lon,d:hav(lat,lon,p.lat,p.lon)})); arr.sort((a,b)=>a.d-b.d); return arr.slice(0, Math.min(n,arr.length)); }
function fmtAcc(a){ return (a==null||!Number.isFinite(a))?'—':('±'+Math.round(a)+' m'); }
function fmtHead(h){ return (h==null||!Number.isFinite(h))? null : Math.round(h)+'°'; }
function fmtSpd(s){ return (s==null||!Number.isFinite(s))? null : Math.round(s*3.6)+' km/h'; }
function nowBR(){ return new Date().toLocaleString('pt-BR'); }

/* ===== Geohash (precisão 9 ~2.4 m) ===== */
const GH32 = "0123456789bcdefghjkmnpqrstuvwxyz";
function geohash(lat, lon, precision=9){
  let idx=0, bit=0, evenBit=true, gh='';
  let latMin=-90, latMax=90, lonMin=-180, lonMax=180;
  while(gh.length<precision){
    if(evenBit){
      const lonMid=(lonMin+lonMax)/2;
      if(lon>=lonMid){ idx=idx*2+1; lonMin=lonMid; } else { idx=idx*2; lonMax=lonMid; }
    }else{
      const latMid=(latMin+latMax)/2;
      if(lat>=latMid){ idx=idx*2+1; latMin=latMid; } else { idx=idx*2; latMax=latMid; }
    }
    evenBit=!evenBit;
    if(++bit==5){ gh+=GH32.charAt(idx); bit=0; idx=0; }
  }
  return gh;
}

/* ===== Chip / botões ===== */
function updateGpsChip(){
  if(!lastPos || lastPos.acc==null){ gpsChip.className='chip bad'; gpsText.textContent='GPS: buscando…'; return; }
  const a=Math.round(lastPos.acc);
  if(a<=ACC_GREEN){ gpsChip.className='chip ok';   gpsText.textContent=`GPS: OK (${fmtAcc(a)})`; }
  else if(a<=ACC_YELLOW){ gpsChip.className='chip warn'; gpsText.textContent=`GPS: ajustando (${fmtAcc(a)})`; }
  else { gpsChip.className='chip bad';  gpsText.textContent=`GPS: fraco (${fmtAcc(a)})`; }
}
function updateButtons(){
  const baseOk=dataset.length>0, posOk=!!lastPos;
  btnSend.disabled=!(baseOk && posOk);
  btnSendNew.disabled=!posOk;
}

/* ===== Offset (m) → graus ===== */
function metersToLat(m){ return m / 111320; } // ~
function metersToLon(m, lat){ const r=111320*Math.cos(lat*Math.PI/180); return r? (m/r) : 0; }
function adjustedCoord(){
  if(!lastPos) return null;
  const lat = lastPos.lat + metersToLat(dN);
  const lon = lastPos.lon + metersToLon(dE, lastPos.lat);
  return {lat, lon};
}
function renderAdjustMeta(){
  ajusteInfo.textContent = `Ajuste: ΔN ${Math.round(dN)} m, ΔE ${Math.round(dE)} m`;
  const adj = adjustedCoord();
  coordInfo.textContent  = adj? `Lat ${adj.lat.toFixed(6)}, Lon ${adj.lon.toFixed(6)}` : `Lat —, Lon —`;
}

/* ===== CSV ===== */
async function loadCSV(){
  try{
    let resp=await fetch('dados.csv?v='+Date.now(), {cache:'no-store'});
    if(!resp.ok){ resp=await fetch('Dados_Completos_Grupo_2_all.csv?v='+Date.now(), {cache:'no-store'}); }
    if(!resp.ok){ showDiag('❌ CSV não encontrado'); return; }

    let text=await resp.text(); if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
    const lines=text.split(/\r?\n/).filter(l=>l.trim()!==''); if(lines.length<2){ showDiag('❌ CSV vazio'); return; }
    const head=lines.shift().split(';');
    const iId=findColumnIndex(head,['id do nox','idnox','id']), iLat=findColumnIndex(head,['latitude','lat']), iLon=findColumnIndex(head,['longitude','lon','long']);
    if(iId<0||iLat<0||iLon<0){ showDiag('❌ Cabeçalho inválido (ID/Latitude/Longitude)'); return; }

    dataset=lines.map(l=>{ const r=l.split(';'); return {id:String(r[iId]||'').trim(), lat:parsePt(r[iLat]), lon:parsePt(r[iLon])}; })
                 .filter(p=>p.id && Number.isFinite(p.lat)&&Number.isFinite(p.lon));
    if(!dataset.length){ showDiag('❌ Sem pontos válidos no CSV'); return; }

    render(true); updateButtons();
  }catch(e){ showDiag('❌ Erro ao carregar CSV'); }
}

/* ===== Render IDs ===== */
function render(force=false){
  const now=performance.now(); if(!force && now-lastRender<150) return; lastRender=now;
  listEl.innerHTML=''; if(!lastPos||!dataset.length) return;
  const items=nearestN(lastPos.lat,lastPos.lon,10); if(!items.length){ listEl.innerHTML='<li>—</li>'; return; }
  const frag=document.createDocumentFragment();
  items.forEach((o,idx)=>{ const li=document.createElement('li'); li.textContent=o.id; if(idx===0) li.style.borderColor='#22c55e'; frag.appendChild(li); });
  listEl.appendChild(frag);
}

/* ===== GPS ===== */
function startGPS(){
  if(!('geolocation' in navigator)){ showDiag('❌ Sem geolocalização no navegador'); return; }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      lastPos={ lat:pos.coords.latitude, lon:pos.coords.longitude, acc:pos.coords.accuracy,
                spd:pos.coords.speed, head:pos.coords.heading, ts:Date.now() };
      updateGpsChip(); updateButtons(); render(true); renderAdjustMeta();
      navigator.geolocation.watchPosition(p=>{
        lastPos={ lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy,
                  spd:p.coords.speed, head:p.coords.heading, ts:Date.now() };
        updateGpsChip(); updateButtons(); render(); renderAdjustMeta();
      },err=>{}, {enableHighAccuracy:true,maximumAge:0,timeout:15000});
    },
    err=>{ showDiag('❗ Permita o GPS para listar os IDs próximos'); },
    {enableHighAccuracy:true,maximumAge:0,timeout:10000}
  );
}

/* ===== Enviar (IDs) ===== */
btnSend.addEventListener('click', ()=>{
  if(!lastPos) return;
  const items=nearestN(lastPos.lat,lastPos.lon,10); if(!items.length) return;
  const accTxt=fmtAcc(lastPos.acc), head=fmtHead(lastPos.head), spd=fmtSpd(lastPos.spd);
  let tx=`${new Date().toLocaleString('pt-BR')}\nGPS agora: Lat ${lastPos.lat.toFixed(6)}, Lon ${lastPos.lon.toFixed(6)} · Precisão ${accTxt}`;
  if(spd) tx+=` · Vel ${spd}`; if(head) tx+=` · Curso ${head}`; tx+='\n';
  items.forEach(o=> tx+=`ID: ${o.id}\n`);
  if(chkMaps.checked){
    tx+='\nLinks de mapa:\n';
    items.forEach(o=> tx+=`ID: ${o.id} → https://maps.google.com/?q=${o.lat.toFixed(6)},${o.lon.toFixed(6)}\n`);
  }
  window.open('https://wa.me/?text='+encodeURIComponent(tx),'_blank');
});

/* ===== Enviar (ponto sem cadastro) ===== */
btnSendNew.addEventListener('click', ()=>{
  if(!lastPos) return;
  const adj=adjustedCoord(); if(!adj) return;
  const accTxt=fmtAcc(lastPos.acc), head=fmtHead(lastPos.head), spd=fmtSpd(lastPos.spd);
  const obs=obsInput.value.trim();
  const gh = geohash(adj.lat, adj.lon, 9); // precisão alta (~2.4 m)

  // ID mais próximo do PONTO AJUSTADO
  let nearestLine='';
  if(chkNearest.checked && dataset.length){
    const [n]=nearestN(adj.lat,adj.lon,1);
    if(n){ const dist=Math.round(hav(adj.lat,adj.lon,n.lat,n.lon)); nearestLine=`\nID mais próximo: ${n.id} — ${dist} m`; }
  }

  // Links sempre presentes (exigência do supervisor)
  const linkG = `https://maps.google.com/?q=${adj.lat.toFixed(6)},${adj.lon.toFixed(6)}`;
  const linkW = `https://waze.com/ul?ll=${adj.lat.toFixed(6)},${adj.lon.toFixed(6)}&navigate=yes`;
  const linkGeo = `geo:${adj.lat.toFixed(6)},${adj.lon.toFixed(6)}?q=${adj.lat.toFixed(6)},${adj.lon.toFixed(6)}`;

  let tx = `PONTO SEM CADASTRO — ${new Date().toLocaleString('pt-BR')}\n`;
  tx += `Lat ${adj.lat.toFixed(6)}, Lon ${adj.lon.toFixed(6)} · Precisão ${accTxt}`;
  if(spd)  tx+=` · Vel ${spd}`;
  if(head) tx+=` · Curso ${head}`;
  if(dN||dE) tx+=`\nAjuste manual: ΔN ${Math.round(dN)} m, ΔE ${Math.round(dE)} m`;
  tx += `\nGeohash: ${gh}`;
  if(obs) tx+=`\nObservação: ${obs}`;
  tx += nearestLine;
  tx += `\n\nLinks de mapa:\nGoogle Maps: ${linkG}\nWaze: ${linkW}\nGeo URI: ${linkGeo}`;

  window.open('https://wa.me/?text='+encodeURIComponent(tx),'_blank');
});

/* ===== Ajuste fino ===== */
function metersToLat(m){ return m / 111320; }
function metersToLon(m, lat){ const r=111320*Math.cos(lat*Math.PI/180); return r? (m/r) : 0; }
function applyN(m){ dN += m; renderAdjustMeta(); }
function applyE(m){ dE += m; renderAdjustMeta(); }
function resetAdj(){ dN=0; dE=0; renderAdjustMeta(); }

document.getElementById('btnN').onclick = ()=> applyN(Number(stepSel.value));
document.getElementById('btnS').onclick = ()=> applyN(-Number(stepSel.value));
document.getElementById('btnE').onclick = ()=> applyE(Number(stepSel.value));
document.getElementById('btnW').onclick = ()=> applyE(-Number(stepSel.value));
document.getElementById('btnReset').onclick = resetAdj;
stepSel.onchange = ()=> renderAdjustMeta();

/* ===== Boot ===== */
(function boot(){ loadCSV(); startGPS(); })();
</script>
</body>
</html>
