<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ID Finder Ultra (Top 10)</title>
<style>
  :root{--bg:#0b1220;--fg:#fff;--muted:#9ca3af;--ok:#25D366;--card:#0f172a;--border:#1f2937}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:system-ui;display:flex;flex-direction:column;align-items:center;min-height:100vh}
  header{width:100%;text-align:center;padding:18px 12px;font-weight:900;letter-spacing:.02em;background:linear-gradient(90deg,#0ea5e9,#5eead4);-webkit-text-fill-color:#fff;color:#fff}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:18px;max-width:860px;width:100%}
  #idBox{font-size:clamp(2rem,6vw,4rem);font-weight:1000;text-align:center}
  #gps,#msg{color:var(--muted);text-align:center}
  .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  button{padding:16px 22px;font-size:1.1rem;font-weight:900;border:0;border-radius:14px;color:#fff;background:var(--ok);cursor:pointer}
  section.card{width:100%;max-width:860px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px}
  h2{margin:0 0 8px 0;font-size:1.05rem;color:#e2e8f0}
  ol{margin:0;padding-left:22px;display:grid;gap:6px}
  li{line-height:1.25}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
  .muted{color:var(--muted)}
</style>
</head>
<body>
  <header>ID Finder Ultra (Top 10)</header>
  <main>
    <div id="idBox">ID: —</div>
    <div id="gps">GPS: —</div>
    <div id="msg"></div>
    <div class="row">
      <button id="btnWA1">Enviar ID por WhatsApp</button>
      <button id="btnWA10">Enviar Top 10 por WhatsApp</button>
    </div>

    <section class="card">
      <h2>Top 10 IDs mais próximos</h2>
      <ol id="topList" class="mono"></ol>
      <div class="muted" id="hint">Carregando…</div>
    </section>
  </main>

<script>
let dataset=[], grid={}, GRID=0.0005; // ~55 m
let lastPos=null, target=null;

function setMsg(s){ document.getElementById('msg').textContent=s||''; }
function setGPS(s){ document.getElementById('gps').textContent=s||'GPS: —'; }

function parsePt(v){ if(v==null) return NaN; return Number(String(v).trim().replace(/\./g,'').replace(',', '.')); }
function hav(a,b,c,d){ const R=6371000; const x=(c-a)*Math.PI/180; const y=(d-b)*Math.PI/180; const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); }
function key(lat,lon){ return Math.floor(lon/GRID)+','+Math.floor(lat/GRID); }

function nearest(lat,lon){ let best=null, bd=Infinity; const gx=Math.floor(lon/GRID), gy=Math.floor(lat/GRID); for(let dx=-1;dx<=1;dx++){ for(let dy=-1;dy<=1;dy++){ const k=(gx+dx)+','+(gy+dy); const arr=grid[k]; if(!arr) continue; for(const i of arr){ const p=dataset[i]; const d=hav(lat,lon,p.lat,p.lon); if(d<bd){ bd=d; best=p; } } } } return best? {pt:best, dist:bd}: null; }

function topN(lat,lon,n=10){ if(!dataset.length) return []; const arr = dataset.map(p=>({id:p.id, lat:p.lat, lon:p.lon, d: hav(lat,lon,p.lat,p.lon)})); arr.sort((a,b)=>a.d-b.d); return arr.slice(0, Math.min(n, arr.length)); }

async function loadCSV(){ try{
  if(location.protocol==='file:'){ setMsg('❌ Abra via http:// (não funciona como arquivo local).'); return; }
  // Tenta dados.csv primeiro; se falhar, tenta Dados_Completos_Grupo_2_all.csv
  let resp = await fetch('dados.csv'); if(!resp.ok){ resp = await fetch('Dados_Completos_Grupo_2_all.csv'); }
  if(!resp.ok){ setMsg('❌ Não encontrei dados.csv'); return; }
  const text = await resp.text();
  const rows = text.split(/\r?\n/).filter(l=>l.trim()!=='').map(l=>l.split(';'));
  if(rows.length<2){ setMsg('❌ CSV vazio'); return; }
  const header = rows.shift().map(h=>h.trim().toLowerCase());
  const iLat = header.indexOf('latitude'); const iLon = header.indexOf('longitude');
  let iId = header.indexOf('id do nox'); if(iId<0) iId = header.indexOf('idnox'); if(iId<0) iId = header.indexOf('id');
  if(iLat<0||iLon<0||iId<0){ setMsg('❌ CSV precisa de colunas: ID do NOX, Latitude, Longitude'); return; }
  dataset = rows.map(r=>({ id: String(r[iId]||'').trim()||'Sem ID', lat: parsePt(r[iLat]), lon: parsePt(r[iLon]) }))
                .filter(p=>Number.isFinite(p.lat)&&Number.isFinite(p.lon));
  grid={}; dataset.forEach((p,i)=>{ const k=key(p.lat,p.lon); (grid[k]||(grid[k]=[])).push(i); });
  setMsg(''); document.getElementById('hint').textContent = 'Pronto.';
}catch(e){ setMsg('❌ Erro ao carregar CSV'); }
}

function renderTop(){ const list=document.getElementById('topList'); list.innerHTML=''; if(!lastPos||!dataset.length){ document.getElementById('hint').textContent='Aguardando GPS/dados…'; return; }
  const items = topN(lastPos.lat,lastPos.lon,10); document.getElementById('hint').textContent = items.length? '' : 'Sem pontos'; items.forEach((o,idx)=>{ const li=document.createElement('li'); li.textContent = `${idx+1}. ${o.id} — ${Math.round(o.d)} m`; list.appendChild(li); });
}

function updateHUD(){ if(!lastPos){ return; } const n=nearest(lastPos.lat,lastPos.lon); if(!n){ document.getElementById('idBox').textContent='ID: —'; setGPS('Nenhum ponto próximo'); renderTop(); return; } target=n; document.getElementById('idBox').textContent='ID: '+n.pt.id; setGPS('Distância: '+Math.round(n.dist)+' m'); renderTop(); }

function startGPS(){ if(!('geolocation' in navigator)){ setMsg('❌ Seu dispositivo/navegador não expôs o GPS'); return; } navigator.geolocation.watchPosition(pos=>{ lastPos={lat:pos.coords.latitude, lon:pos.coords.longitude}; updateHUD(); }, err=>{ setMsg('❌ Permita o acesso ao GPS no navegador'); }, {enableHighAccuracy:true, maximumAge:0, timeout:15000}); }

document.getElementById('btnWA1').onclick=()=>{ if(!target){ alert('Sem ID ainda. Aguardando GPS/dados…'); return; } const msg=`ID encontrado: ${target.pt.id} — aprox ${Math.round(target.dist)} m`; const u='https://wa.me/?text='+encodeURIComponent(msg); window.open(u,'_blank'); };

document.getElementById('btnWA10').onclick=()=>{ if(!lastPos||!dataset.length){ alert('Aguardando GPS/dados…'); return; } const items=topN(lastPos.lat,lastPos.lon,10); if(!items.length){ alert('Sem pontos para listar.'); return; } let tx='Top 10 IDs próximos:\n'; items.forEach((o,i)=> tx += `${i+1}. ${o.id} — ${Math.round(o.d)} m\n`); const u='https://wa.me/?text='+encodeURIComponent(tx); window.open(u,'_blank'); };

loadCSV(); startGPS();
</script>
</body>
</html>
