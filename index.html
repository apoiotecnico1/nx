<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NOX – Inspeção Noturna (IDs Apagados)</title>
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin>
  <style>
    :root{
      --bg:#0b1220; --fg:#e5e7eb; --muted:#94a3b8; --accent:#0ea5e9; --accent2:#22c55e; --warn:#f59e0b; --err:#ef4444; --card:#0f172a; --border:#1f2937; --wa:#25D366;
    }
    @media (prefers-color-scheme: light){ :root{ --bg:#ffffff; --fg:#0f172a; --muted:#64748b; --accent:#0284c7; --accent2:#16a34a; --warn:#d97706; --err:#dc2626; --card:#f8fafc; --border:#e2e8f0; } }
    html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,"Helvetica Neue",Arial,"Noto Sans";line-height:1.45;min-height:100vh}

    /* Splash */
    .splash{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(1000px 600px at 50% -20%, color-mix(in srgb,var(--accent) 22%, transparent), transparent), var(--bg); z-index:9999}
    .splash-card{display:grid;gap:12px;place-items:center;text-align:center;padding:28px 20px;border-radius:20px;background:color-mix(in srgb, var(--card) 85%, transparent);border:1px solid var(--border);box-shadow:0 30px 120px rgba(0,0,0,.25)}
    .logo{font-weight:900;letter-spacing:.06em;font-size:clamp(1.2rem,3vw+1rem,2rem);background:linear-gradient(90deg,var(--accent),#5eead4);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .steps{color:var(--muted);font-size:.98rem;min-height:1.2em}
    .progress{height:6px;width:220px;border:1px solid var(--border);border-radius:999px;overflow:hidden}
    .bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),#5eead4)}

    /* AppBar */
    .appbar{position:sticky;top:0;z-index:10;background:linear-gradient(90deg,var(--accent),#5eead4)}
    .appbar-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px;color:#fff}
    .brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:.03em}

    .container{max-width:1100px;margin:0 auto;padding:14px}
    .grid{display:grid;gap:14px;grid-template-columns:1fr}
    @media (min-width:980px){.grid{grid-template-columns:1.1fr .9fr}}

    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px}
    .card h2{margin:4px 0 10px;font-size:1.02rem}

    .kvs{display:grid;grid-template-columns:auto 1fr;gap:6px 12px;font-variant-numeric:tabular-nums}
    .kvs dt{color:var(--muted)} .kvs dd{margin:0;font-weight:700}
    .status{margin-top:6px;font-size:.95rem;color:var(--muted)}

    .row{display:flex;gap:8px;flex-wrap:wrap}
    .btn{appearance:none;border:1px solid var(--border);background:color-mix(in srgb,var(--accent) 20%, transparent);color:var(--fg);padding:10px 12px;border-radius:12px;cursor:pointer;font-weight:800}
    .btn.primary{background:var(--accent);color:#fff;border-color:transparent}
    .btn.ok{background:var(--accent2);color:#fff;border-color:transparent}
    .btn.warn{background:var(--warn);color:#000;border-color:transparent}
    .btn.err{background:var(--err);color:#fff;border-color:transparent}
    .btn.wa{background:var(--wa);color:#fff;border-color:transparent}

    .select{appearance:none;border:1px solid var(--border);background:var(--bg);color:var(--fg);padding:8px 10px;border-radius:10px;font-weight:700}
    .input{appearance:none;border:1px solid var(--border);background:var(--bg);color:var(--fg);padding:8px 10px;border-radius:10px;font-weight:600}

    /* Map (colapsável) */
    .mapWrap{margin-top:10px}
    .mapHeader{display:flex;align-items:center;justify-content:space-between;gap:8px}
    #map{width:100%;height:220px;border-radius:12px;border:1px solid var(--border);margin-top:8px;display:none}
    #map[aria-hidden="false"]{display:block}

    /* Próximos (esquerda) */
    .currentID{font-size:1.8rem;font-weight:900;letter-spacing:.04em}
    ol#topList{margin:0;padding-left:18px;display:grid;gap:6px}
    .item-line{display:flex;justify-content:space-between;gap:8px;padding:10px 12px;border:1px dashed var(--border);border-radius:12px;background:color-mix(in srgb,var(--card) 86%, transparent)}
    .id{font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* Registro (direita) */
    .tools{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
    .table{width:100%;border-collapse:collapse;font-size:.96rem}
    .table th,.table td{border-bottom:1px dashed var(--border);padding:8px 6px;vertical-align:top}
    .table th{color:var(--muted);font-weight:700;text-align:left}
    .chip{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.86rem;font-weight:900}
    .chip.ok{background:color-mix(in srgb,var(--accent2) 25%, transparent)}
    .chip.err{background:color-mix(in srgb,var(--err) 28%, transparent)}
    .chip.warn{background:color-mix(in srgb,var(--warn) 28%, transparent);color:#000}

    /* FAB principal WhatsApp */
    .fab{position:fixed;right:16px;bottom:16px;z-index:20;display:inline-flex;align-items:center;gap:10px;justify-content:center;height:56px;border-radius:999px;background:var(--wa);color:#fff;box-shadow:0 12px 24px rgba(0,0,0,.18);border:none;cursor:pointer;padding:0 14px;font-weight:900}
    .fab:active{transform:translateY(1px)}
    .fab svg{width:24px;height:24px;fill:#fff}
  </style>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <!-- Splash -->
  <div id="splash" class="splash" role="dialog" aria-modal="true">
    <div class="splash-card">
      <div class="logo">NOX — Inspeção Noturna</div>
      <div class="steps" id="splashStep">Preparando…</div>
      <div class="progress"><div id="splashBar" class="bar"></div></div>
    </div>
  </div>

  <!-- AppBar -->
  <div class="appbar">
    <div class="appbar-inner">
      <div class="brand">NOX · Inspeção</div>
      <div class="row">
        <label for="qtySelect" class="status">Top:</label>
        <select id="qtySelect" class="select" aria-label="Quantidade de IDs próximos na lista">
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="20">20</option>
          <option value="30">30</option>
        </select>
        <button id="btnToggleMap" class="btn" type="button" aria-controls="map" aria-expanded="false">Mapa</button>
        <button id="btnStreet" class="btn" type="button">Street View</button>
        <button id="btnMaps" class="btn" type="button">Google Maps</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="grid">
      <!-- ESQUERDA: Operação de campo -->
      <div>
        <section class="card">
          <h2>GPS</h2>
          <dl class="kvs">
            <dt>Latitude:</dt><dd id="latVal">—</dd>
            <dt>Longitude:</dt><dd id="lonVal">—</dd>
            <dt>Precisão:</dt><dd id="accVal">—</dd>
            <dt>Status:</dt><dd id="statusVal" class="status">Iniciando…</dd>
          </dl>
          <div class="mapWrap">
            <div id="map" aria-hidden="true"></div>
          </div>
        </section>

        <section class="card">
          <h2>ID atual</h2>
          <div id="currentId" class="currentID">—</div>
          <div class="tools">
            <button class="btn err" data-flag="APAGADO">Marcar APAGADO</button>
            <button class="btn warn" data-flag="INTERMITENTE">Intermitente</button>
            <button class="btn warn" data-flag="OSCILANTE">Oscilante</button>
            <button class="btn ok" data-flag="OK">OK</button>
            <input id="noteInput" class="input" style="min-width:220px" placeholder="Anotar observação (opcional)">
            <button id="btnAnotar" class="btn primary" type="button">Anotar</button>
          </div>
        </section>

        <section class="card">
          <h2>IDs próximos</h2>
          <ol id="topList" aria-live="polite"></ol>
          <div id="listStatus" class="status">Aguardando dados…</div>
        </section>
      </div>

      <!-- DIREITA: Registro de inspeção -->
      <div>
        <section class="card">
          <h2>Ocorrências da inspeção</h2>
          <div class="row" style="margin-bottom:8px">
            <input id="searchId" class="input" style="min-width:200px" placeholder="Buscar/selecionar ID…" />
            <button id="btnSelect" class="btn" type="button">Selecionar como atual</button>
            <label class="status" style="display:inline-flex;align-items:center;gap:6px"><input id="chkNC" type="checkbox"> Mostrar só não conformes</label>
          </div>
          <table class="table" id="occTable">
            <thead><tr><th><input id="chkAll" type="checkbox"></th><th>ID</th><th>Situação</th><th>Obs</th><th>Data/Hora</th><th>Posição</th><th></th></tr></thead>
            <tbody></tbody>
          </table>
          <div class="row" style="margin-top:10px">
            <button id="btnSendSel" class="btn wa" type="button">Enviar selecionados (WhatsApp)</button>
            <button id="btnSendAll" class="btn wa" type="button">Enviar TODOS (WhatsApp)</button>
            <button id="btnCSV" class="btn" type="button">Exportar CSV</button>
            <button id="btnClear" class="btn err" type="button">Limpar tudo</button>
          </div>
        </section>

        <section class="card">
          <h2>Evidência (opcional)</h2>
          <div class="row">
            <input id="inpPhoto" type="file" accept="image/*;capture=camera" hidden>
            <input id="inpVideo" type="file" accept="video/*;capture=camcorder" hidden>
            <button id="btnPhoto" class="btn ok" type="button">Tirar foto</button>
            <button id="btnVideo" class="btn warn" type="button">Gravar vídeo</button>
          </div>
          <div id="preview" class="preview" style="margin-top:8px"></div>
        </section>
      </div>
    </div>
  </div>

  <!-- FAB WhatsApp (envio rápido dos IDs próximos exibidos) -->
  <button id="fabWhats" class="fab" title="Enviar Top (IDs próximos) no WhatsApp" aria-label="Enviar IDs do Top no WhatsApp">
    <svg viewBox="0 0 32 32" aria-hidden="true"><path d="M19.11 17.19c-.27-.14-1.57-.77-1.81-.86-.24-.09-.42-.14-.6.14-.18.27-.69.86-.85 1.03-.16.18-.31.2-.58.07-.27-.14-1.13-.42-2.15-1.34-.79-.71-1.32-1.58-1.48-1.85-.16-.27-.02-.41.12-.55.12-.12.27-.31.4-.47.13-.16.18-.27.27-.45.09-.18.05-.34-.02-.47-.07-.14-.6-1.45-.82-1.99-.22-.53-.44-.46-.6-.47-.16-.01-.34-.01-.52-.01s-.47.07-.72.34c-.24.27-.94.92-.94 2.25 0 1.33.96 2.62 1.09 2.8.13.18 1.88 2.87 4.55 4.02.64.28 1.14.45 1.53.58.64.2 1.22.17 1.68.1.51-.08 1.57-.64 1.79-1.26.22-.62.22-1.15.15-1.26-.07-.11-.24-.18-.51-.31zM16.02 3C9.94 3 5 7.94 5 14.02c0 2.63.87 5.06 2.36 7.02L6 27l6.12-1.32c1.88 1.16 4.1 1.83 6.5 1.83 6.08 0 11.02-4.94 11.02-11.02S22.1 3 16.02 3zm0 20.1c-2.32 0-4.47-.75-6.22-2.03l-.45-.33-3.69.8.79-3.6-.35-.47A8.964 8.964 0 0 1 7.02 14c0-4.97 4.03-9 9-9s9 4.03 9 9-4.03 9-9 9z"/></svg>
    <span id="fabQty">10</span>
  </button>

  <script>
    /******************** Utils ********************/
    const $ = (sel) => document.querySelector(sel);
    const nf0 = new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 0 });
    const nfCoord = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 5, maximumFractionDigits: 6 });
    const dtFmt = new Intl.DateTimeFormat('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
    function escapeHtml(str){ return String(str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;'); }
    function parsePtNumber(v){ if(v===null||v===undefined) return NaN; const s=String(v).trim(); if(!s) return NaN; const normalized=s.replace(/\./g,'').replace(',', '.'); const n=Number(normalized); return Number.isFinite(n)?n:NaN; }
    function haversineMeters(lat1,lon1,lat2,lon2){ const R=6371000; const toRad=(d)=>d*Math.PI/180; const dLat=toRad(lat2-lat1); const dLon=toRad(lon2-lon1); const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2; const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); return R*c; }

    /******************** Splash ********************/
    const splash = $('#splash'); const splashBar=$('#splashBar'); const splashStep=$('#splashStep');
    function runSplash(){ let p=0; const steps=['Carregando módulos…','Lendo dados…','Obtendo GPS…','Preparando interface…']; const t=setInterval(()=>{ p=Math.min(100,p+Math.random()*22); splashBar.style.width=p+'%'; const idx=Math.min(steps.length-1,Math.floor(p/25)); splashStep.textContent=steps[idx]; if(p>=100){ clearInterval(t); setTimeout(()=>{ splash.style.display='none'; },700);} },350); }

    /******************** Estado ********************/
    let dataset=[]; // { id, lat, lon, endereco?, plaqueta? }
    let lastPosition=null; let lastSorted=[]; let watchingId=null; let currentId=null;
    let map=null, marker=null, mapVisible=false;
    let store = JSON.parse(localStorage.getItem('nox_inspecao_v1')||'[]'); // {id,status,note,ts,lat,lon}

    /******************** CSV ********************/
    async function carregarCSV(){ const paths=['./dados.csv','./Dados_Completos_Grupo_2_all.csv']; for(const path of paths){ try{ const resp=await fetch(path,{cache:'no-store'}); if(!resp.ok) throw 0; const text=await resp.text(); const parsed=Papa.parse(text,{header:true,delimiter:';',skipEmptyLines:'greedy',dynamicTyping:false}); if(parsed.errors && parsed.errors.length){ throw new Error(parsed.errors[0].message||'Falha CSV'); } const fields=(parsed.meta && parsed.meta.fields)?parsed.meta.fields:[]; const pick=(c)=>{ const lc=fields.map(f=>f?String(f).toLowerCase().trim():''); for(const x of c){ const i=lc.indexOf(x); if(i>=0) return fields[i]; } return null; }; const latKey=pick(['latitude','lat']); const lonKey=pick(['longitude','lon','long']); const idKey=(()=>{ const lc=fields.map(f=>f?String(f).toLowerCase().trim():''); let i=lc.indexOf('id do nox'); if(i>=0) return fields[i]; i=lc.indexOf('idnox'); if(i>=0) return fields[i]; i=lc.indexOf('id'); if(i>=0) return fields[i]; return null; })(); const endKey=pick(['endereco','endereço']); if(!latKey||!lonKey||!idKey) throw new Error('Colunas latitude/longitude/ID não encontradas.'); const out=[]; for(const row of parsed.data){ const lat=parsePtNumber(row[latKey]); const lon=parsePtNumber(row[lonKey]); const rawId=row[idKey]; if(!Number.isFinite(lat)||!Number.isFinite(lon)) continue; if(lat===0&&lon===0) continue; if(lat<-90||lat>90) continue; if(lon<-180||lon>180) continue; out.push({ id:(rawId===undefined||rawId===null||String(rawId).trim()==='')?'Sem ID':String(rawId).trim(), lat, lon, endereco:endKey? String(row[endKey]??'').trim():undefined }); } dataset=out; atualizarListStatus(); render(); return; }catch(_){ } } dataset=[]; atualizarListStatus(); }

    /******************** GPS ********************/
    function startGPS(){ if(!('geolocation' in navigator)){ setStatus('GPS não suportado', true); return; } setStatus('Aguardando GPS…'); try{ if(watchingId!==null) navigator.geolocation.clearWatch(watchingId); watchingId=navigator.geolocation.watchPosition((pos)=>{ const {latitude,longitude,accuracy}=pos.coords; lastPosition={lat:latitude,lon:longitude,acc:accuracy}; $('#latVal').textContent=nfCoord.format(latitude); $('#lonVal').textContent=nfCoord.format(longitude); $('#accVal').textContent=nf0.format(accuracy)+' m'; if(mapVisible) updateMap(latitude, longitude); setStatus(dataset.length>0? 'Pronto' : 'Carregando dados…'); render(); }, (error)=>{ let msg='Falha ao obter localização'; if(error && typeof error.code!=='undefined'){ switch(error.code){ case error.PERMISSION_DENIED: msg='Permissão negada'; break; case error.POSITION_UNAVAILABLE: msg='Indisponível'; break; case error.TIMEOUT: msg='Tempo esgotado'; break; } } setStatus(msg, true); }, { enableHighAccuracy:true, maximumAge:0, timeout:15000 }); }catch(err){ setStatus('Falha ao obter localização: '+(err.message||'Erro desconhecido'), true); } }

    /******************** Map ********************/
    function initMap(){ if(map) return; map = L.map('map'); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '' }).addTo(map); const p=[-23.2237,-45.9009]; map.setView(p, 13); marker=L.marker(p).addTo(map); }
    function updateMap(lat, lon){ initMap(); const p=[lat,lon]; marker.setLatLng(p); map.setView(p, Math.max(15, map.getZoom())); }

    /******************** Render ********************/
    function render(){ const listEl=$('#topList'); listEl.innerHTML=''; const qty = Math.max(1, Math.min( Number($('#qtySelect')?.value || 10), 9999 )); $('#fabQty').textContent=String(qty); if(!lastPosition && dataset.length===0){ $('#listStatus').textContent='Carregando dados e GPS…'; $('#listStatus').className='status'; return; } if(!lastPosition){ $('#listStatus').textContent='Aguardando GPS…'; $('#listStatus').className='status'; return; } if(dataset.length===0){ $('#listStatus').textContent='Carregando dados…'; $('#listStatus').className='status'; return; } const {lat,lon}=lastPosition; lastSorted=dataset.map(p=>({ id:p.id, lat:p.lat, lon:p.lon, endereco:p.endereco, d:haversineMeters(lat,lon,p.lat,p.lon) })).sort((a,b)=>a.d-b.d); const toShow=lastSorted.slice(0, qty); if(toShow.length===0){ $('#listStatus').textContent='Nenhum ponto válido.'; $('#listStatus').className='status err'; return; } currentId = toShow[0].id; $('#currentId').textContent = currentId; for(const item of toShow){ const li=document.createElement('li'); const row=document.createElement('div'); row.className='item-line'; const idSpan=document.createElement('span'); idSpan.className='id'; idSpan.innerHTML=escapeHtml(item.id); row.appendChild(idSpan); li.appendChild(row); li.addEventListener('click',()=>{ currentId=item.id; $('#currentId').textContent=currentId; }); listEl.appendChild(li); } $('#listStatus').textContent=''; $('#listStatus').className='status'; renderTable(); }

    function setStatus(msg,isError=false,isOk=false){ const el=$('#statusVal'); if(!el) return; el.textContent=msg; el.className='status'+(isError?' err':(isOk?' ok':'')); }
    function atualizarListStatus(){ const el=$('#listStatus'); if(!el) return; if(dataset.length===0){ el.textContent='Carregando dados…'; el.className='status'; } else { el.textContent='Aguardando GPS…'; el.className='status'; } }

    /******************** Store (ocorrências) ********************/
    function addOccurrence({id,status,note}){ const ts = new Date(); const pos = lastPosition? {lat:lastPosition.lat, lon:lastPosition.lon}: {lat:null, lon:null}; const rec = { id:String(id), status:String(status), note:String(note||'').trim(), ts: ts.toISOString(), lat: pos.lat, lon: pos.lon }; store.push(rec); persist(); renderTable(); }
    function persist(){ localStorage.setItem('nox_inspecao_v1', JSON.stringify(store)); }
    function removeOccurrence(idx){ store.splice(idx,1); persist(); renderTable(); }
    function clearAll(){ if(!confirm('Limpar todos os registros da inspeção?')) return; store=[]; persist(); renderTable(); }

    function renderTable(){ const onlyNC = $('#chkNC').checked; const tbody = $('#occTable tbody'); tbody.innerHTML=''; const rows = store.map((rec,idx)=>({rec,idx}))
      .filter(x=> !onlyNC || (x.rec.status && x.rec.status!=='OK'));
      rows.forEach(({rec,idx})=>{ const tr=document.createElement('tr'); const tdSel=document.createElement('td'); const cb=document.createElement('input'); cb.type='checkbox'; cb.dataset.idx=String(idx); tdSel.appendChild(cb); const tdId=document.createElement('td'); tdId.textContent=rec.id; const tdSt=document.createElement('td'); const chip=document.createElement('span'); chip.className='chip '+(rec.status==='OK'?'ok':(rec.status==='APAGADO'?'err':'warn')); chip.textContent=rec.status||'—'; tdSt.appendChild(chip); const tdNote=document.createElement('td'); tdNote.textContent=rec.note||'—'; const tdTs=document.createElement('td'); try{ tdTs.textContent = dtFmt.format(new Date(rec.ts)); }catch{ tdTs.textContent='—'; } const tdPos=document.createElement('td'); tdPos.textContent = (Number.isFinite(rec.lat)&&Number.isFinite(rec.lon))? `${nfCoord.format(rec.lat)}, ${nfCoord.format(rec.lon)}`:'—'; const tdRm=document.createElement('td'); const btn=document.createElement('button'); btn.className='btn'; btn.textContent='Remover'; btn.addEventListener('click', ()=> removeOccurrence(idx)); tdRm.appendChild(btn); tr.appendChild(tdSel); tr.appendChild(tdId); tr.appendChild(tdSt); tr.appendChild(tdNote); tr.appendChild(tdTs); tr.appendChild(tdPos); tr.appendChild(tdRm); tbody.appendChild(tr); }); $('#chkAll').checked=false; }

    /******************** WhatsApp ********************/
    function buildHeader(){ const now=new Date(); const dataHora=dtFmt.format(now); const {lat,lon}=lastPosition||{lat:0,lon:0}; const ref = lastSorted && lastSorted[0] ? (lastSorted[0].endereco || '—') : '—'; return `--- RELATÓRIO DE INSPEÇÃO (NOX) ---\nData/Hora: ${dataHora}\nLocalização atual: ${nfCoord.format(lat)}, ${nfCoord.format(lon)}\nEndereço (referência): ${ref}\n-----------------------\n`; }
    function sendWhatsTop(){ if(!lastSorted || lastSorted.length===0 || !lastPosition){ alert('Aguardando atualização do Top.'); return; } const qty = Math.max(1, Math.min( Number($('#qtySelect')?.value || 10), 9999 )); const items = lastSorted.slice(0, qty); let msg = buildHeader(); msg += `Top ${qty} IDs próximos:\n`; items.forEach((item, idx)=>{ msg += `${idx+1}. ${String(item.id).replace(/\s+/g,' ').trim()}\n`; }); openWA(msg); }
    function sendWhatsFromSelection(all=false){ if(store.length===0){ alert('Nenhuma ocorrência registrada.'); return; } const header = buildHeader(); let rows=[]; if(all){ rows = store; } else { const cbs = Array.from(document.querySelectorAll('#occTable tbody input[type="checkbox"]')); const idxs = cbs.filter(cb=>cb.checked).map(cb=>Number(cb.dataset.idx)); if(idxs.length===0){ alert('Selecione ao menos um item.'); return; } rows = idxs.map(i=>store[i]); }
      let msg = header + 'Ocorrências registradas:\n'; rows.forEach((r,i)=>{ const dh = (()=>{ try{return dtFmt.format(new Date(r.ts));}catch{return '—';} })(); const pos = (Number.isFinite(r.lat)&&Number.isFinite(r.lon))? `${nfCoord.format(r.lat)}, ${nfCoord.format(r.lon)}`:'—'; const note = r.note? ` — obs: ${r.note}`:''; msg += `${i+1}. ${r.id} — ${r.status}${note} — ${pos} — ${dh}\n`; }); openWA(msg); }
    function openWA(msg){ const url='https://wa.me/?text='+encodeURIComponent(msg); window.open(url,'_blank','noopener,noreferrer'); }

    /******************** Export CSV ********************/
    function exportCSV(){ if(store.length===0){ alert('Nada para exportar.'); return; } const head='ID;Status;Obs;DataHora;Latitude;Longitude\n'; const lines=store.map(r=>[r.id,r.status,(r.note||'').replaceAll(';',','), (()=>{try{return dtFmt.format(new Date(r.ts));}catch{return r.ts;}})(), r.lat??'', r.lon??''].join(';')).join('\n'); const blob = new Blob([head+lines], {type:'text/csv;charset=utf-8;'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='inspecao_nox.csv'; document.body.appendChild(a); a.click(); setTimeout(()=>{document.body.removeChild(a); URL.revokeObjectURL(url);},300); }

    /******************** Evidência ********************/
    function shareFile(file){ const header = buildHeader(); if(navigator.canShare && navigator.canShare({ files:[file] })){ navigator.share({ files:[file], title:'Inspeção NOX', text: header }).catch(()=>{}); } else { openWA(header+'(Anexe a foto/vídeo em seguida)'); alert('Seu navegador não suporta compartilhamento direto de arquivos. O WhatsApp será aberto com o texto; anexe a mídia manualmente.'); } }
    function handleFileInput(ev){ const file = ev.target.files && ev.target.files[0]; if(!file) return; const prev=$('#preview'); const url=URL.createObjectURL(file); let el; if(file.type.startsWith('image/')){ el=document.createElement('img'); el.src=url; el.alt='foto'; } else if(file.type.startsWith('video/')){ el=document.createElement('video'); el.src=url; el.controls=true; } prev.innerHTML=''; prev.appendChild(el); shareFile(file); ev.target.value=''; }

    /******************** Ações UI ********************/
    function bindUI(){
      // splash
      runSplash();
      // topo
      $('#qtySelect').addEventListener('change', render);
      $('#btnToggleMap').addEventListener('click', ()=>{ mapVisible=!mapVisible; const el=$('#map'); el.setAttribute('aria-hidden', String(!mapVisible)); if(mapVisible && lastPosition){ updateMap(lastPosition.lat, lastPosition.lon); } });
      $('#btnStreet').addEventListener('click', ()=>{ if(!lastPosition){ alert('Aguardando GPS…'); return; } const {lat,lon}=lastPosition; window.open(`https://maps.google.com/?cbll=${lat},${lon}&layer=c`,'_blank','noopener,noreferrer'); });
      $('#btnMaps').addEventListener('click', ()=>{ if(!lastPosition){ alert('Aguardando GPS…'); return; } const {lat,lon}=lastPosition; window.open(`https://www.google.com/maps?q=${lat},${lon}`,'_blank','noopener,noreferrer'); });
      // botões de flag do ID atual
      document.querySelectorAll('[data-flag]').forEach(btn=>{ btn.addEventListener('click', ()=>{ if(!currentId){ alert('Aguardando lista de IDs…'); return; } addOccurrence({id: currentId, status: btn.dataset.flag, note: $('#noteInput').value}); $('#noteInput').value=''; }); });
      $('#btnAnotar').addEventListener('click', ()=>{ if(!currentId){ alert('Aguardando lista de IDs…'); return; } const note=$('#noteInput').value||''; addOccurrence({id: currentId, status: note? 'ANOTAÇÃO':'OK', note}); $('#noteInput').value=''; });
      // seleção de ID manual
      $('#btnSelect').addEventListener('click', ()=>{ const q=($('#searchId').value||'').trim(); if(!q){ alert('Digite um ID.'); return; } currentId=q; $('#currentId').textContent=currentId; });
      // tabela
      $('#chkAll').addEventListener('change', (e)=>{ const c= e.target.checked; document.querySelectorAll('#occTable tbody input[type="checkbox"]').forEach(cb=>cb.checked=c); });
      $('#chkNC').addEventListener('change', renderTable);
      // envio
      $('#fabWhats').addEventListener('click', sendWhatsTop);
      $('#btnSendSel').addEventListener('click', ()=>sendWhatsFromSelection(false));
      $('#btnSendAll').addEventListener('click', ()=>sendWhatsFromSelection(true));
      // export/clear
      $('#btnCSV').addEventListener('click', exportCSV);
      $('#btnClear').addEventListener('click', clearAll);
      // evidência
      $('#btnPhoto').addEventListener('click', ()=>$('#inpPhoto').click());
      $('#btnVideo').addEventListener('click', ()=>$('#inpVideo').click());
      $('#inpPhoto').addEventListener('change', handleFileInput);
      $('#inpVideo').addEventListener('change', handleFileInput);
    }

    /******************** Boot ********************/
    document.addEventListener('DOMContentLoaded',()=>{ bindUI(); carregarCSV(); startGPS(); });
  </script>
</body>
</html>
