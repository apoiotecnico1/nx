<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ID GPS · IDs Próximos</title>
<meta name="theme-color" content="#ffffff" />
<style>
  :root{
    /* Paleta clara moderna */
    --bg:#f8fafc;         /* fundo */
    --fg:#0f172a;         /* texto principal */
    --muted:#475569;      /* texto secundário */
    --border:#e5e7eb;     /* linhas sutis */
    --surface:#ffffff;    /* cartões/branco puro */

    /* Acentos e estados */
    --accent:#2563eb;     /* azul vivo */
    --accent-2:#22c55e;   /* verde vivo */
    --ok:#16a34a;         /* OK chip */
    --warn:#f59e0b;       /* Ajustando chip */
    --bad:#ef4444;        /* Fraco chip */

    /* Botões */
    --btn:#22c55e;        /* WhatsApp vibe */
    --btn-alt:#2563eb;    /* localização sem cadastro */

    /* Tipografia e foco */
    --focus:#3b82f6;
    --radius:14px;
    --shadow:0 6px 20px rgba(15,23,42,.06);
  }

  /* Reset básico */
  *,*::before,*::after{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:var(--bg);color:var(--fg);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }

  /* Cabeçalho minimal (discreto e futurista) */
  header{padding:14px 16px}
  .brand{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:10px}
  .dot-logo{width:10px;height:10px;border-radius:50%;background:linear-gradient(90deg,var(--accent),var(--accent-2))}
  .brand h1{
    margin:0; font-size:clamp(.95rem,1.6vw,1.05rem);
    font-weight:900; letter-spacing:.08em; color:var(--muted);
  }

  /* Barra de status (GPS + diagnóstico) */
  #status{
    max-width:1100px;margin:6px auto 0;display:flex;gap:12px;align-items:center;flex-wrap:wrap;
    padding:0 16px
  }
  .chip,.badge{
    display:inline-flex;align-items:center;gap:10px;border:1px solid var(--border);
    background:var(--surface); color:var(--muted);
    padding:10px 12px; border-radius:999px; font-weight:800; box-shadow:var(--shadow)
  }
  .dot{width:10px;height:10px;border-radius:50%}
  .ok .dot{background:var(--ok)}     .ok{color:#065f46}
  .warn .dot{background:var(--warn)} .warn{color:#7c4a00}
  .bad .dot{background:var(--bad)}   .bad{color:#7f1d1d}
  .badge{color:#1e293b}

  /* Conteúdo em “cards” (portal) */
  main{max-width:1100px;margin:12px auto 24px;display:grid;gap:16px;padding:0 16px}
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; box-shadow:var(--shadow)
  }
  .card h2{margin:0 0 12px 0;font-size:clamp(1.05rem,1.8vw,1.1rem);color:#0b1220}

  /* Ações (botões e opções) */
  .actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  button{
    padding:14px 18px;font-size:clamp(.95rem,1.6vw,1.02rem);font-weight:900;border:0;border-radius:12px;color:#ffffff;
    cursor:pointer; transition:transform .08s ease, filter .15s ease; box-shadow:var(--shadow)
  }
  button:active{transform:translateY(1px)}
  button:hover{filter:brightness(1.03)}
  button:disabled{opacity:.55;cursor:not-allowed;filter:none}
  #btnSend{background:var(--btn)}
  #btnSendNew{background:var(--btn-alt)}

  .opt{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:.95rem}
  .opt input{width:16px;height:16px;accent-color:var(--accent)}

  /* Campo observação */
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{color:#0f172a;font-weight:800;font-size:.95rem}
  .field input{
    padding:12px;border-radius:12px;border:1px solid var(--border); background:#ffffff;color:#0f172a;font-size:1rem;
    outline:2px solid transparent; transition:outline-color .15s ease, box-shadow .15s ease
  }
  .field input:focus{outline:2px solid var(--focus); outline-offset:2px; box-shadow:0 0 0 4px rgba(59,130,246,.15)}

  /* Lista / Skeleton */
  ul{margin:0;padding:0;list-style:none;display:grid;gap:8px}
  li{
    line-height:1.3;font-family:ui-monospace,Consolas,Menlo,monospace;
    border:1px solid var(--border);border-radius:12px;padding:12px;background:#ffffff;
    font-size:1.03rem;color:#0b1220
  }
  li:first-child{border-color:#22c55e} /* destaque do mais próximo */
  .skeleton{
    height:48px;border-radius:12px;background:
      linear-gradient(90deg,#e5e7eb 25%,#f1f5f9 40%,#e5e7eb 60%);
    background-size:200% 100%; animation:shimmer 1.1s infinite
  }
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* Grid responsivo */
  .col-4{grid-column:span 4}
  .col-8{grid-column:span 8}
  @media (max-width:900px){ .col-4,.col-8{grid-column:1/-1} }

  /* Acessibilidade: foco visível para botões */
  button:focus-visible{outline:3px solid var(--focus); outline-offset:2px}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="dot-logo" aria-hidden="true"></span>
    <h1>ID GPS</h1>
  </div>
</header>

<!-- Status: chip de GPS + diagnóstico -->
<div id="status" role="region" aria-label="Status do sistema">
  <div id="gpsChip" class="chip bad" aria-live="polite">
    <span class="dot"></span><span id="gpsText">GPS: aguardando…</span>
  </div>
  <div id="diag" class="badge" style="display:none" aria-live="polite">—</div>
</div>

<main>
  <div class="grid">
    <!-- Ações -->
    <section class="card col-4" aria-label="Ações">
      <h2>Ações</h2>

      <div class="actions" style="margin-bottom:12px">
        <button id="btnSend"    disabled>Enviar ID por WhatsApp</button>
        <label class="opt" title="Adicionar links do Google Maps no texto enviado">
          <input type="checkbox" id="chkMaps" />
          <span>incluir links de mapa</span>
        </label>
      </div>

      <div class="field" style="margin-top:6px">
        <label for="obs">Observação (ponto sem cadastro, opcional)</label>
        <input id="obs" type="text" placeholder="Ex.: Poste novo no canteiro central" />
      </div>
      <div class="actions" style="margin-top:10px">
        <button id="btnSendNew" disabled>Enviar localização (sem cadastro)</button>
      </div>
    </section>

    <!-- IDs próximos -->
    <section class="card col-8" aria-label="IDs mais próximos">
      <h2>IDs próximos</h2>
      <ul id="list" aria-live="polite">
        <li class="skeleton"></li>
        <li class="skeleton"></li>
        <li class="skeleton"></li>
        <li class="skeleton"></li>
        <li class="skeleton"></li>
      </ul>
    </section>
  </div>
</main>

<script>
/* ========= Config do chip (visual apenas) ========= */
const ACC_GREEN = 10;   // m
const ACC_YELLOW = 25;  // m

/* ========= Estado ========= */
let dataset = [];           // {id, lat, lon}
let lastPos = null;         // {lat, lon, acc}
let lastRender = 0;

/* ========= Helpers ========= */
const gpsChip   = document.getElementById('gpsChip');
const gpsText   = document.getElementById('gpsText');
const diag      = document.getElementById('diag');
const btnSend   = document.getElementById('btnSend');
const chkMaps   = document.getElementById('chkMaps');
const listEl    = document.getElementById('list');
const obsInput  = document.getElementById('obs');
const btnSendNew= document.getElementById('btnSendNew');

function showDiag(msg){
  diag.style.display='inline-flex';
  diag.textContent=msg;
}
function normalizeStr(s){
  return String(s||'').trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')  // remove acentos
    .replace(/[^a-z0-9_ ]+/g,' ')
    .replace(/\s+/g,' ');
}
function findColumnIndex(headers, candidates){
  const map=headers.map(h=>normalizeStr(h));
  for(const c of candidates){ const i=map.indexOf(c); if(i>=0) return i; }
  for(const c of candidates){ for(let i=0;i<map.length;i++){ if(map[i].includes(c)) return i; } }
  return -1;
}
function parsePt(v){
  if(v==null) return NaN;
  const s=String(v).trim();
  if(/,\d{1,}$/.test(s)) return Number(s.replace(/\./g,'').replace(',','.'));
  return Number(s);
}
function hav(a,b,c,d){
  const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180;
  const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;
  return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u));
}
function nearestN(lat, lon, n=10){
  if(!dataset.length) return [];
  const arr=dataset.map(p=>({id:p.id,lat:p.lat,lon:p.lon,d:hav(lat,lon,p.lat,p.lon)}));
  arr.sort((a,b)=>a.d-b.d);
  return arr.slice(0, Math.min(n, arr.length));
}
function fmtAcc(acc){ return (acc==null||!Number.isFinite(acc))?'—':('±'+Math.round(acc)+' m'); }

function updateGpsChip(){
  if(!lastPos || lastPos.acc==null){
    gpsChip.className='chip bad'; gpsText.textContent='GPS: buscando…'; return;
  }
  const acc=Math.round(lastPos.acc);
  if(acc<=ACC_GREEN){ gpsChip.className='chip ok';   gpsText.textContent=`GPS: OK (${fmtAcc(acc)})`; }
  else if(acc<=ACC_YELLOW){ gpsChip.className='chip warn'; gpsText.textContent=`GPS: ajustando (${fmtAcc(acc)})`; }
  else { gpsChip.className='chip bad';  gpsText.textContent=`GPS: fraco (${fmtAcc(acc)})`; }
}
function updateButtons(){
  const basePronta = dataset.length>0;
  const posPronta  = !!lastPos;
  btnSend.disabled    = !(basePronta && posPronta);
  btnSendNew.disabled = !posPronta;   // ponto sem cadastro: só precisa da posição
}

/* ========= Carregamento robusto do CSV ========= */
async function loadCSV(){
  try{
    let resp = await fetch('dados.csv?v='+Date.now(), {cache:'no-store'});
    if(!resp.ok){ resp = await fetch('Dados_Completos_Grupo_2_all.csv?v='+Date.now(), {cache:'no-store'}); }
    if(!resp.ok){ showDiag('❌ CSV não encontrado'); return; }

    let text=await resp.text();
    if(text.charCodeAt(0)===0xFEFF) text=text.slice(1); // remove BOM
    const lines=text.split(/\r?\n/).filter(l=>l.trim()!=='');
    if(lines.length<2){ showDiag('❌ CSV vazio'); return; }

    const head=lines.shift().split(';');
    const iId  = findColumnIndex(head,['id do nox','idnox','id']);
    const iLat = findColumnIndex(head,['latitude','lat']);
    const iLon = findColumnIndex(head,['longitude','lon','long']);
    if(iId<0||iLat<0||iLon<0){ showDiag('❌ Cabeçalho inválido (ID/Latitude/Longitude)'); return; }

    dataset=lines.map(l=>{
      const r=l.split(';');
      return {id:String(r[iId]||'').trim(), lat:parsePt(r[iLat]), lon:parsePt(r[iLon])};
    }).filter(p=>p.id && Number.isFinite(p.lat) && Number.isFinite(p.lon));
    if(!dataset.length){ showDiag('❌ Sem pontos válidos no CSV'); return; }

    render(true); updateButtons();
  }catch(e){ showDiag('❌ Erro ao carregar CSV'); }
}

/* ========= Render da lista ========= */
function render(force=false){
  const now=performance.now(); if(!force && now-lastRender<150) return; lastRender=now;
  listEl.innerHTML='';
  if(!lastPos||!dataset.length) return;

  const items=nearestN(lastPos.lat,lastPos.lon,10);
  if(!items.length){ listEl.innerHTML='<li>—</li>'; return; }

  const frag=document.createDocumentFragment();
  items.forEach((o,idx)=>{
    const li=document.createElement('li');
    li.textContent=o.id;
    if(idx===0) li.style.borderColor='#22c55e';
    frag.appendChild(li);
  });
  listEl.appendChild(frag);
}

/* ========= GPS (prompt inicial + watch) ========= */
function startGPS(){
  if(!('geolocation' in navigator)){ showDiag('❌ Sem geolocalização no navegador'); return; }

  navigator.geolocation.getCurrentPosition(
    pos=>{
      lastPos={lat:pos.coords.latitude,lon:pos.coords.longitude,acc:pos.coords.accuracy};
      updateGpsChip(); updateButtons(); render(true);

      navigator.geolocation.watchPosition(p=>{
        lastPos={lat:p.coords.latitude,lon:p.coords.longitude,acc:p.coords.accuracy};
        updateGpsChip(); updateButtons(); render();
      },err=>{}, {enableHighAccuracy:true,maximumAge:0,timeout:15000});
    },
    err=>{ showDiag('❗ Permita o GPS para listar os IDs próximos'); },
    {enableHighAccuracy:true,maximumAge:0,timeout:10000}
  );
}

/* ========= Envio WhatsApp ========= */
btnSend.addEventListener('click', ()=>{
  if(!lastPos) return;
  const items=nearestN(lastPos.lat,lastPos.lon,10); if(!items.length) return;

  const accTxt=fmtAcc(lastPos.acc);
  let tx=`GPS agora: Lat ${lastPos.lat.toFixed(6)}, Lon ${lastPos.lon.toFixed(6)} · Precisão ${accTxt}\n`;

  // Padrão: somente IDs
  items.forEach(o=> tx+=`ID: ${o.id}\n`);

  // Opcional: links de mapa
  if(chkMaps.checked){
    tx+='\nLinks de mapa:\n';
    items.forEach(o=> tx+=`ID: ${o.id} → https://maps.google.com/?q=${o.lat.toFixed(6)},${o.lon.toFixed(6)}\n`);
  }

  window.open('https://wa.me/?text='+encodeURIComponent(tx),'_blank');
});

/* ========= Enviar ponto sem cadastro ========= */
btnSendNew.addEventListener('click', ()=>{
  if(!lastPos) return;
  const accTxt=fmtAcc(lastPos.acc);
  const obs=obsInput.value.trim();

  let tx=`PONTO SEM CADASTRO\nGPS agora: Lat ${lastPos.lat.toFixed(6)}, Lon ${lastPos.lon.toFixed(6)} · Precisão ${accTxt}`;
  if(obs) tx+=`\nObservação: ${obs}`;
  if(chkMaps.checked){
    tx+=`\n\nLink de mapa:\nhttps://maps.google.com/?q=${lastPos.lat.toFixed(6)},${lastPos.lon.toFixed(6)}`;
  }
  window.open('https://wa.me/?text='+encodeURIComponent(tx),'_blank');
});

/* ========= Boot ========= */
(function boot(){ loadCSV(); startGPS(); })();
</script>
</body>
</html>
