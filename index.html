
<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NOX mais próximos — Auto-GPS (Top 10)</title>
  <meta name="theme-color" content="#0a7" />
  <style>
    :root{--bg:#0b0e11;--panel:#12171c;--muted:#90a4b8;--fg:#e6eef5;--accent:#13b37a;--line:#1f2a33}
    *{box-sizing:border-box}
    body{margin:0;background:#0b0e11;color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto}
    header{position:sticky;top:0;z-index:2;background:#0b0e11cc;backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
    header .wrap{display:flex;align-items:center;gap:10px;justify-content:space-between;padding:12px 14px}
    h1{font-size:16px;margin:0;font-weight:700}
    main{max-width:820px;margin:0 auto;padding:12px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;box-shadow:0 4px 16px #0006}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .muted{color:var(--muted)}
    .pill{display:inline-flex;gap:6px;align-items:center;background:#0d1922;border:1px solid var(--line);padding:6px 10px;border-radius:999px}
    #ids{list-style:none;margin:10px 0 0 0;padding:0}
    #ids li{padding:10px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
    #ids small{color:var(--muted)}
    button{background:linear-gradient(180deg,#14ba80,#0aa36f);border:none;color:#08261b;font-weight:700;padding:10px 14px;border-radius:10px;cursor:pointer}
    .grid{display:grid;grid-template-columns:1fr auto auto;gap:8px}
    @media (max-width:640px){.grid{grid-template-columns:1fr}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>NOX mais próximos (Top 10)</h1>
      <div class="row">
        <button id="btnWhats">Enviar IDs no WhatsApp</button>
      </div>
    </div>
  </header>

  <main>
    <section class="card">
      <div class="grid">
        <div class="row"><span class="pill">📍 <b id="gpsLat">–</b>, <b id="gpsLon">–</b></span><span class="muted" id="acc">Precisão: —</span></div>
        <div class="muted" id="status">Carregando dados e localização…</div>
        <div class="muted" id="info"></div>
      </div>
      <ul id="ids"></ul>
    </section>
  </main>

  <script>
  // Caminhos: primeiro raiz, depois /data
  const DATASET_PATHS = [
    './Dados_Completos_Grupo_2_all.csv',
    './data/Dados_Completos_Grupo_2_all.csv'
  ];

  const S = { pontos: [], pos: null, prontoDados: false };
  const toNum = (v)=>{ if(v==null) return NaN; if(typeof v==='number') return v; const s=String(v).trim(); const t=s.replace(/\./g,'').replace(',', '.'); const n=Number(t); return Number.isFinite(n)?n:Number(s); };
  function hav(lat1,lon1,lat2,lon2){ const R=6371000, d2r=d=>d*Math.PI/180; const dLat=d2r(lat2-lat1), dLon=d2r(lon2-lon1); const a=Math.sin(dLat/2)**2+Math.cos(d2r(lat1))*Math.cos(d2r(lat2))*Math.sin(dLon/2)**2; return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); }
  function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

  function render(){
    const ul = document.getElementById('ids');
    if(!S.pos){ document.getElementById('status').textContent = 'Aguardando GPS…'; return; }
    if(!S.pontos.length){ document.getElementById('status').textContent = 'Sem pontos carregados.'; return; }
    const top = S.pontos.map(p=>({...p,d:hav(S.pos.lat,S.pos.lon,p.lat,p.lon)})).sort((a,b)=>a.d-b.d).slice(0,10);
    ul.innerHTML = top.map(p=>`<li><b>${escapeHtml(p.id)}</b> <small>${Math.round(p.d)} m</small></li>`).join('');
    document.getElementById('status').textContent = 'Pronto';
  }

  function startGPS(){
    if(!('geolocation' in navigator)){
      document.getElementById('status').textContent='Geolocalização não suportada.';return;
    }
    navigator.geolocation.watchPosition((pos)=>{
      S.pos={lat:pos.coords.latitude,lon:pos.coords.longitude,acc:pos.coords.accuracy};
      document.getElementById('gpsLat').textContent=S.pos.lat.toFixed(6);
      document.getElementById('gpsLon').textContent=S.pos.lon.toFixed(6);
      document.getElementById('acc').textContent='Precisão: '+Math.round(S.pos.acc)+' m';
      if(S.prontoDados) render();
    },(err)=>{
      document.getElementById('status').textContent=err.message||'Falha ao obter localização';
    },{enableHighAccuracy:true,maximumAge:1000,timeout:15000});
  }

  async function carregarCSV(){
    let ok=false, lastErr='';
    for(const path of DATASET_PATHS){
      try{
        const res = await fetch(path, {cache:'no-store'});
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        Papa.parse(text, {
          header: true,
          skipEmptyLines: true,
          delimiter: ';',
          complete: (r)=>{
            const lower = r.meta.fields.map(k=>k.toLowerCase());
            const keyBy = (alts)=>{ const i = lower.findIndex(k=>alts.some(a=>k.includes(a))); return i>=0? r.meta.fields[i]: null; };
            const kLat = keyBy(['latitude','lat']);
            const kLon = keyBy(['longitude','lon','long']);
            const kId  = keyBy(['id do nox','idnox','id']) || 'ID do NOX';
            if(!kLat || !kLon){ throw new Error('Colunas Latitude/Longitude não encontradas'); }
            const pts = r.data.map(row=>{
              const lat = toNum(row[kLat]);
              const lon = toNum(row[kLon]);
              if(!Number.isFinite(lat)||!Number.isFinite(lon)||lat===0||lon===0) return null;
              const id  = String(row[kId] ?? row['ID'] ?? 'Sem ID').trim();
              return {id, lat, lon};
            }).filter(Boolean);
            S.pontos = pts;
            S.prontoDados = true;
            document.getElementById('info').textContent = `Fonte: ${path} · pontos válidos: ${pts.length}`;
            if(S.pos) render();
          }
        });
        ok=true; break;
      }catch(e){ lastErr=e.message; }
    }
    if(!ok){ document.getElementById('status').textContent = 'Erro ao carregar dados: '+(lastErr||'desconhecido'); }
  }

  function sendWhats(){
    if(!S.pos||!S.pontos.length){ alert('Aguardando dados e GPS.'); return; }
    const top = S.pontos.map(p=>({...p,d:hav(S.pos.lat,S.pos.lon,p.lat,p.lon)})).sort((a,b)=>a.d-b.d).slice(0,10);
    const linhas = [ 'IDs mais próximos:', `📍 Posição: ${S.pos.lat.toFixed(6)}, ${S.pos.lon.toFixed(6)}`, ...top.map((p,i)=>`${i+1}. ${p.id} — ${Math.round(p.d)} m`) ];
    const url = `https://wa.me/?text=${encodeURIComponent(linhas.join('
'))}`;
    window.open(url,'_blank');
  }

  document.getElementById('btnWhats').addEventListener('click', sendWhats);

  startGPS();
  carregarCSV();
  </script>
</body>
</html>
