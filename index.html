<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NOX mais próximos (Top 10)</title>
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0ea5e9" />
  <style>
    :root { --bg:#ffffff; --fg:#0f172a; --muted:#64748b; --accent:#0ea5e9; --accent-2:#22c55e; --card:#f8fafc; --border:#e2e8f0; --ok:#16a34a; --err:#dc2626; }
    @media (prefers-color-scheme: dark){ :root{ --bg:#0b1220; --fg:#e5e7eb; --muted:#94a3b8; --accent:#38bdf8; --accent-2:#22c55e; --card:#0f172a; --border:#1f2937; }}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,"Helvetica Neue",Arial,"Noto Sans","Apple Color Emoji","Segoe UI Emoji";line-height:1.45;min-height:100vh}

    /* Header com visual mais atrativo */
    .appbar{position:sticky;top:0;z-index:10;background:linear-gradient(90deg,var(--accent),#5eead4);color:#fff}
    .appbar-inner{max-width:960px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .app-title{margin:0;font-size:clamp(1.1rem,2.2vw+0.8rem,1.6rem);font-weight:800;letter-spacing:.3px}

    .container{max-width:960px;margin:0 auto;padding:16px}

    .btn{appearance:none;border:1px solid transparent;background:var(--accent);color:#fff;padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:700;transition:filter .15s ease,transform .02s ease;white-space:nowrap}
    .btn.secondary{background:var(--accent-2)}
    .btn:active{transform:translateY(1px)}
    .btn[disabled]{opacity:.6;cursor:not-allowed}

    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    @media (min-width:640px){.grid{grid-template-columns:1fr 1fr}}

    .kvs{display:grid;grid-template-columns:auto 1fr;gap:8px 12px;font-variant-numeric:tabular-nums}
    .kvs dt{color:var(--muted)}
    .kvs dd{margin:0;font-weight:700}

    .status{margin-top:6px;font-size:.95rem;color:var(--muted)}
    .status.ok{color:var(--ok)}
    .status.err{color:var(--err)}

    .list-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:0 0 8px}
    .ctrls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .select{appearance:none;border:1px solid var(--border);background:var(--bg);color:var(--fg);padding:8px 10px;border-radius:10px;font-weight:600}
    label.small{color:var(--muted);font-size:.92rem}

    ol#topList{margin:0;padding-left:18px;display:grid;gap:6px}
    .item-line{display:flex;justify-content:space-between;gap:8px;padding:10px 12px;border:1px dashed var(--border);border-radius:12px;background:color-mix(in srgb,var(--card) 86%, transparent)}
    .id{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .dist{color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}

    /* Splash overlay */
    .overlay{position:fixed;inset:0;display:grid;place-items:center;background:var(--bg);z-index:9999;transition:opacity .25s ease,visibility .25s ease}
    .overlay.hidden{opacity:0;visibility:hidden}
    .splash-content{text-align:center}
    .logo{font-weight:900;font-size:1.2rem;color:#fff;background:linear-gradient(90deg,var(--accent),#5eead4);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.08em}
    .spinner{margin-top:12px;width:44px;height:44px;border:3px solid color-mix(in srgb, var(--accent) 22%, transparent);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Lock (senha) overlay */
    .lock{position:fixed;inset:0;display:grid;place-items:center;background:color-mix(in srgb,var(--bg) 80%, #0000);z-index:9998;transition:opacity .25s ease,visibility .25s ease}
    .lock.hidden{opacity:0;visibility:hidden}
    .lock-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;width:min(92vw,380px);box-shadow:0 6px 20px rgba(0,0,0,.07)}
    .lock-card h2{margin:0 0 10px;font-size:1.1rem}
    .field{display:grid;gap:6px;margin:10px 0 14px}
    .input{appearance:none;width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:1rem;background:var(--bg);color:var(--fg)}
    .hint{color:var(--muted);font-size:.92rem}
    .error{color:var(--err);font-size:.95rem;min-height:1.2em}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <!-- AppBar -->
  <div class="appbar">
    <div class="appbar-inner">
      <h1 class="app-title">NOX — Mais próximos</h1>
      <button id="btnWhats" class="btn" type="button" title="Enviar no WhatsApp">Enviar WhatsApp</button>
    </div>
  </div>

  <!-- Splash -->
  <div id="splash" class="overlay">
    <div class="splash-content">
      <div class="logo">NOX - Localizador</div>
      <div class="spinner" aria-hidden="true"></div>
      <div class="hint" style="margin-top:10px;">Iniciando…</div>
    </div>
  </div>

  <!-- Lock (senha) -->
  <div id="lock" class="lock hidden" aria-modal="true" role="dialog">
    <div class="lock-card">
      <h2>Acesso restrito</h2>
      <div class="hint">Informe a senha para entrar.</div>
      <div class="field">
        <label for="pwd">Senha</label>
        <input id="pwd" class="input" type="password" inputmode="text" autocomplete="current-password" placeholder="Digite a senha" />
      </div>
      <div class="error" id="pwdErr"></div>
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button id="btnEnter" class="btn secondary" type="button">Entrar</button>
      </div>
      <div class="hint" style="margin-top:10px;">Dica de teste: <code>nox</code></div>
    </div>
  </div>

  <div class="container" id="app" hidden>
    <div class="grid">
      <section class="card">
        <h2 style="margin:0 0 8px;font-size:1.05rem;">GPS</h2>
        <dl class="kvs">
          <dt>Latitude:</dt><dd id="latVal">—</dd>
          <dt>Longitude:</dt><dd id="lonVal">—</dd>
          <dt>Precisão:</dt><dd id="accVal">—</dd>
          <dt>Status:</dt><dd id="statusVal" class="status">Carregando dados e localização…</dd>
        </dl>
      </section>

      <section class="card">
        <div class="list-header">
          <h2 style="margin:0;font-size:1.05rem;">Top 10 mais próximos</h2>
          <div class="ctrls">
            <label for="qtySelect" class="small">WhatsApp:</label>
            <select id="qtySelect" class="select" aria-label="Quantidade para enviar no WhatsApp">
              <option value="5">5</option>
              <option value="10" selected>10</option>
              <option value="20">20</option>
              <option value="30">30</option>
            </select>
          </div>
        </div>
        <ol id="topList" aria-live="polite"></ol>
        <div id="listStatus" class="status">Aguardando dados…</div>
      </section>
    </div>
  </div>

  <script>
    // ===== Utils =====
    const $ = (sel) => document.querySelector(sel);
    const nfBR2 = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    const nfBR0 = new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 0 });
    const nfCoord = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 5, maximumFractionDigits: 6 });

    function escapeHtml(str){ return String(str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;'); }
    function parsePtNumber(v){ if(v===null||v===undefined) return NaN; const s=String(v).trim(); if(!s) return NaN; const normalized=s.replace(/\./g,'').replace(',', '.'); const n=Number(normalized); return Number.isFinite(n)?n:NaN; }
    function haversineMeters(lat1,lon1,lat2,lon2){ const R=6371000; const toRad=(d)=>d*Math.PI/180; const dLat=toRad(lat2-lat1); const dLon=toRad(lon2-lon1); const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2; const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); return R*c; }
    function formatDistance(m){ if(!Number.isFinite(m)) return '—'; if(m<1000) return nfBR0.format(Math.round(m))+' m'; return nfBR2.format(m/1000)+' km'; }

    // ===== Estado =====
    let dataset=[]; // { id, lat, lon, endereco?, plaqueta? }
    let validCount=0; let dataSourcePath='—';
    let lastPosition=null; let lastTopTen=[]; let lastSorted=[]; let watchingId=null;

    // App control
    const AUTH_KEY='nox_auth_v1';
    const PASSWORD='nox';

    // ===== CSV Loader (./dados.csv; fallback ./Dados_Completos_Grupo_2_all.csv) =====
    async function carregarCSV(){
      const paths=['./dados.csv','./Dados_Completos_Grupo_2_all.csv'];
      let lastErr=null;
      for(const path of paths){
        try{
          const resp=await fetch(path,{cache:'no-store'}); if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const text=await resp.text(); if(typeof Papa==='undefined'||!Papa.parse) throw new Error('Biblioteca CSV indisponível');
          const parsed=Papa.parse(text,{header:true,delimiter:';',skipEmptyLines:'greedy',dynamicTyping:false});
          if(parsed.errors && parsed.errors.length){ const e0=parsed.errors[0]; throw new Error(`Falha ao parsear CSV (linha ${e0.row ?? '-' }): ${e0.message || 'Erro desconhecido'}`); }
          const fields=(parsed.meta && parsed.meta.fields)?parsed.meta.fields:[];
          const pick=(cands)=>{ const lc=fields.map(f=>f?String(f).toLowerCase().trim():''); for(const c of cands){ const i=lc.indexOf(c); if(i>=0) return fields[i]; } return null; };
          const latKey=pick(['latitude','lat']); const lonKey=pick(['longitude','lon','long']);
          const idKey=(()=>{ const lc=fields.map(f=>f?String(f).toLowerCase().trim():''); let i=lc.indexOf('id do nox'); if(i>=0) return fields[i]; i=lc.indexOf('idnox'); if(i>=0) return fields[i]; i=lc.indexOf('id'); if(i>=0) return fields[i]; return null; })();
          const endKey=pick(['endereco','endereço']); const plaquetaKey=pick(['plaqueta']);
          if(!latKey||!lonKey||!idKey) throw new Error('Colunas necessárias não encontradas (latitude/longitude/ID).');
          const out=[]; for(const row of parsed.data){
            const lat=parsePtNumber(row[latKey]); const lon=parsePtNumber(row[lonKey]); const rawId=row[idKey];
            if(!Number.isFinite(lat)||!Number.isFinite(lon)) continue; if(lat===0&&lon===0) continue; if(lat<-90||lat>90) continue; if(lon<-180||lon>180) continue;
            out.push({ id:(rawId===undefined||rawId===null||String(rawId).trim()==='')?'Sem ID':String(rawId).trim(), lat, lon, endereco:endKey? String(row[endKey]??'').trim():undefined, plaqueta: plaquetaKey? String(row[plaquetaKey]??'').trim():undefined });
          }
          dataset=out; validCount=out.length; dataSourcePath=path; atualizarListStatus(); render(); return;
        }catch(err){ lastErr=err; }
      }
      dataset=[]; validCount=0; dataSourcePath='—'; setStatus(`Erro ao carregar dados: ${lastErr && lastErr.message? lastErr.message:'Falha desconhecida'}`, true); atualizarListStatus();
    }

    // ===== GPS =====
    function startGPS(){
      if(!('geolocation' in navigator)){ setStatus('Falha ao obter localização: Sem suporte', true); return; }
      setStatus('Aguardando GPS…');
      try{ if(watchingId!==null) navigator.geolocation.clearWatch(watchingId);
        watchingId=navigator.geolocation.watchPosition(
          (pos)=>{ const {latitude,longitude,accuracy}=pos.coords; lastPosition={lat:latitude,lon:longitude,acc:accuracy};
            $('#latVal').textContent=nfCoord.format(latitude); $('#lonVal').textContent=nfCoord.format(longitude); $('#accVal').textContent=nfBR0.format(accuracy)+' m';
            if(dataset.length>0){ setStatus('Pronto', false, true);} else { setStatus('Carregando dados…'); }
            render(); },
          (error)=>{ let msg='Falha ao obter localização'; if(error && typeof error.code!=='undefined'){ switch(error.code){ case error.PERMISSION_DENIED: msg='Falha ao obter localização: Permissão negada'; break; case error.POSITION_UNAVAILABLE: msg='Falha ao obter localização: Indisponível'; break; case error.TIMEOUT: msg='Falha ao obter localização: Tempo esgotado'; break; } } setStatus(msg, true); },
          { enableHighAccuracy:true, maximumAge:0, timeout:15000 }
        );
      }catch(err){ setStatus('Falha ao obter localização: '+(err.message||'Erro desconhecido'), true); }
    }

    // ===== Render =====
    function render(){
      const listEl=$('#topList'); listEl.innerHTML='';
      if(!lastPosition && dataset.length===0){ $('#listStatus').textContent='Carregando dados e aguardando GPS…'; $('#listStatus').className='status'; return; }
      if(!lastPosition){ $('#listStatus').textContent='Aguardando GPS…'; $('#listStatus').className='status'; return; }
      if(dataset.length===0){ $('#listStatus').textContent='Carregando dados…'; $('#listStatus').className='status'; return; }

      const {lat,lon}=lastPosition;
      lastSorted = dataset.map(p=>({ id:p.id, lat:p.lat, lon:p.lon, d:haversineMeters(lat,lon,p.lat,p.lon) }))
                          .sort((a,b)=>a.d-b.d);

      const toShow = lastSorted.slice(0,10);
      lastTopTen = toShow;

      if(toShow.length===0){ $('#listStatus').textContent='Nenhum ponto válido encontrado.'; $('#listStatus').className='status err'; return; }

      for(const item of toShow){
        const li=document.createElement('li');
        const row=document.createElement('div'); row.className='item-line';
        const idSpan=document.createElement('span'); idSpan.className='id'; idSpan.innerHTML=escapeHtml(item.id);
        const dSpan=document.createElement('span'); dSpan.className='dist'; dSpan.textContent=formatDistance(item.d);
        row.appendChild(idSpan); row.appendChild(dSpan); li.appendChild(row); listEl.appendChild(li);
      }

      $('#listStatus').textContent='Atualizado com base na sua posição atual.'; $('#listStatus').className='status ok';
    }

    function setStatus(msg,isError=false,isOk=false){ const el=$('#statusVal'); el.textContent=msg; el.className='status'+(isError?' err':(isOk?' ok':'')); }
    function atualizarListStatus(){ if(dataset.length===0){ $('#listStatus').textContent='Carregando dados…'; $('#listStatus').className='status'; } else { $('#listStatus').textContent='Dados carregados. Aguardando GPS…'; $('#listStatus').className='status'; } }

    // ===== WhatsApp =====
    function sendWhats(){
      const qtySel = $('#qtySelect');
      const n = Math.max(1, Math.min( Number(qtySel?.value || 10), 9999 ));
      if(!lastPosition || !lastSorted || lastSorted.length===0){ alert('Aguardando GPS e dados para montar a lista.'); return; }
      const { lat, lon } = lastPosition;
      const items = lastSorted.slice(0, n);
      let msg = 'IDs mais próximos:\n';
      msg += `\uD83D\uDCCD Posição: ${nfCoord.format(lat)}, ${nfCoord.format(lon)}\n`;
      items.forEach((item, idx) => {
        const rank = idx + 1; const idText = String(item.id).replace(/\s+/g, ' ').trim();
        msg += `${rank}. ${idText} — ${formatDistance(item.d)}\n`;
      });
      const url = 'https://wa.me/?text=' + encodeURIComponent(msg);
      window.open(url, '_blank', 'noopener,noreferrer');
    }

    // ===== App boot (splash + senha) =====
    function showApp(){ $('#app').hidden=false; carregarCSV(); startGPS(); }
    function unlockIfAuth(){ const splash=$('#splash'); const lock=$('#lock'); const hasAuth=sessionStorage.getItem(AUTH_KEY)==='1'; setTimeout(()=>{ splash.classList.add('hidden'); },500); setTimeout(()=>{ if(hasAuth){ lock.classList.add('hidden'); showApp(); } else { lock.classList.remove('hidden'); $('#pwd').focus(); } },650); }
    function handleLogin(){ const pwd=$('#pwd').value.trim(); if(pwd.toLowerCase()===PASSWORD){ sessionStorage.setItem(AUTH_KEY,'1'); $('#pwdErr').textContent=''; $('#lock').classList.add('hidden'); showApp(); } else { $('#pwdErr').textContent = 'Senha incorreta'; } }

    document.addEventListener('DOMContentLoaded',()=>{
      $('#btnWhats').addEventListener('click', sendWhats);
      $('#btnEnter').addEventListener('click', handleLogin);
      $('#pwd').addEventListener('keydown',(e)=>{ if(e.key==='Enter') handleLogin(); });
      setStatus('Carregando dados e localização…'); atualizarListStatus(); unlockIfAuth();
    });
  </script>
</body>
</html>
