<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NOX M2M · IDs Próximos</title>
<meta name="theme-color" content="#0ea5e9" />
<style>
  :root{--bg:#0b1220;--fg:#fff;--muted:#94a3b8;--card:#0f172a;--border:#1f2937;--wa:#25D366;--brand:#0ea5e9}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--fg);font-family:system-ui, -apple-system, "Segoe UI", Roboto, Arial;display:flex;flex-direction:column}
  header{padding:18px 14px;text-align:center;font-weight:1000;letter-spacing:.02em;background:linear-gradient(90deg,var(--brand),#5eead4);color:#fff}
  header small{display:block;font-weight:600;opacity:.9;margin-top:4px}
  main{flex:1;display:flex;flex-direction:column;align-items:center;gap:12px;padding:16px}
  .wrap{width:min(860px,96vw)}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px}
  #gps,#msg{color:var(--muted);text-align:center}
  ul{margin:0;padding:0;list-style:none;display:grid;gap:6px}
  li{line-height:1.25;font-family:ui-monospace,Consolas,Menlo,monospace;border-bottom:1px dashed var(--border);padding:8px 2px}
  .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  button{padding:14px 18px;font-size:1.02rem;font-weight:900;border:0;border-radius:12px;color:#fff;background:var(--wa);cursor:pointer}
  .hint{color:var(--muted);font-size:.92rem;text-align:center}
  footer{padding:12px;text-align:center;color:var(--muted);font-size:.9rem}
  .badge{display:inline-block;padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:#ffffff10;font-weight:700}
</style>
</head>
<body>
  <header>
    NOX M2M · IDs Próximos
    <small>Primeiro da lista = mais próximo • Envie a lista por WhatsApp</small>
  </header>
  <main>
    <div class="wrap">
      <div id="gps" class="badge">GPS: —</div>
    </div>
    <div id="msg" class="wrap"></div>

    <section class="card wrap">
      <ul id="list"></ul>
      <div class="hint" id="hint">Aguardando GPS/dados…</div>
    </section>
    <div class="row wrap">
      <button id="btnWA">Enviar lista</button>
    </div>
  </main>
  <footer>
    Hospede este arquivo e o <b>dados.csv</b> em <b>HTTPS</b> (GitHub Pages) para o GPS funcionar corretamente.
  </footer>

<script>
let dataset=[], lastPos=null, lastAcc=null; // acc = precisão (m)
const nf0=new Intl.NumberFormat('pt-BR',{maximumFractionDigits:0});

function setMsg(s){ document.getElementById('msg').textContent=s||''; }
function setGPS(s){ document.getElementById('gps').textContent=s||'GPS: —'; }
function parsePt(v){ if(v==null) return NaN; return Number(String(v).trim().replace(/\./g,'').replace(',', '.')); }
function hav(a,b,c,d){ const R=6371000; const x=(c-a)*Math.PI/180, y=(d-b)*Math.PI/180; const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); }

function nearestN(lat,lon,n=10){ if(!dataset.length) return []; const arr=dataset.map(p=>({id:p.id,d:hav(lat,lon,p.lat,p.lon)})); arr.sort((a,b)=>a.d-b.d); return arr.slice(0, Math.min(n, arr.length)); }

async function loadCSV(){ try{
  if(location.protocol==='file:'){ setMsg('⚠ Abra via HTTPS (GitHub Pages). file:// limita geolocalização.'); }
  let resp = await fetch('dados.csv'); if(!resp.ok){ resp = await fetch('Dados_Completos_Grupo_2_all.csv'); }
  if(!resp.ok){ setMsg('❌ Não encontrei dados.csv'); return; }
  const text = await resp.text();
  const rows = text.split(/\r?\n/).filter(l=>l.trim()!=='');
  if(rows.length<2){ setMsg('❌ CSV vazio'); return; }
  const head = rows.shift().split(';').map(h=>h.trim().toLowerCase());
  const iLat=head.indexOf('latitude'); const iLon=head.indexOf('longitude');
  let iId=head.indexOf('id do nox'); if(iId<0) iId=head.indexOf('idnox'); if(iId<0) iId=head.indexOf('id');
  if(iLat<0||iLon<0||iId<0){ setMsg('❌ CSV precisa de colunas: ID do NOX, Latitude, Longitude'); return; }
  dataset = rows.map(l=>{ const r=l.split(';'); return { id:String(r[iId]||'').trim()||'Sem ID', lat:parsePt(r[iLat]), lon:parsePt(r[iLon]) }; })
                .filter(p=>Number.isFinite(p.lat)&&Number.isFinite(p.lon));
  document.getElementById('hint').textContent = 'Pronto.';
  render();
}catch(e){ setMsg('❌ Erro ao carregar CSV'); }
}

function render(){ const ul=document.getElementById('list'); ul.innerHTML=''; if(!lastPos||!dataset.length){ document.getElementById('hint').textContent='Aguardando GPS/dados…'; return; }
  const items = nearestN(lastPos.lat,lastPos.lon,10); document.getElementById('hint').textContent = items.length? '' : 'Sem pontos nesta área';
  items.forEach((o)=>{ const li=document.createElement('li'); li.textContent = `${o.id} — ${nf0.format(o.d)} m`; ul.appendChild(li); });
}

function startGPS(){ if(!('geolocation' in navigator)){ setMsg('❌ Dispositivo sem geolocalização'); return; }
  navigator.geolocation.watchPosition(pos=>{
    lastPos={lat:pos.coords.latitude, lon:pos.coords.longitude};
    lastAcc = Number.isFinite(pos.coords.accuracy)? Math.round(pos.coords.accuracy): null;
    const accText = lastAcc!=null? `±${lastAcc} m` : '—';
    setGPS(`Lat ${pos.coords.latitude.toFixed(6)}, Lon ${pos.coords.longitude.toFixed(6)} · Precisão ${accText}`);
    render();
  }, err=>{ setMsg('❌ Permita o acesso ao GPS no navegador'); }, {enableHighAccuracy:true, maximumAge:0, timeout:15000});
}

document.getElementById('btnWA').onclick=()=>{
  if(!lastPos||!dataset.length){ alert('Aguardando GPS/dados…'); return; }
  const items = nearestN(lastPos.lat,lastPos.lon,10);
  if(!items.length){ alert('Sem pontos nesta área.'); return; }
  const accText = lastAcc!=null? `±${lastAcc} m` : '—';
  let tx = `GPS agora: Lat ${lastPos.lat.toFixed(6)}, Lon ${lastPos.lon.toFixed(6)} · Precisão ${accText}\n`;
  // Apenas a lista de IDs (sem numeração), cada linha no formato solicitado
  items.forEach((o)=> tx += `ID: ${o.id}   distancia referencia: ${nf0.format(o.d)}m\n`);
  const u='https://wa.me/?text='+encodeURIComponent(tx);
  window.open(u,'_blank');
};

loadCSV(); startGPS();
</script>
</body>
</html>
