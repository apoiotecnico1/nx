<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ID GPS · IDs Próximos</title>
<meta name="theme-color" content="#0b1020" />
<style>
  :root{
    /* Paleta DARK (anil/índigo com neutros profundos) */
    --brand:#5a64ff;     /* anil vivo para acentos/foco */
    --brand2:#00c2c9;    /* ciano/verde-água de apoio */
    --bg:#0b1020;        /* fundo principal */
    --bg-2:#0f1630;      /* superfície inferior */
    --fg:#e6ebff;        /* texto principal */
    --muted:#a3b1d1;     /* texto secundário */
    --border:#1e2647;    /* divisórias */
    --surface:#0f1630;   /* cartões */
    --ok:#22c55e;        /* estados de GPS */
    --warn:#f59e0b;
    --bad:#ef4444;
    --btn:#22c55e;       /* botão principal (Whats) */
    --focus:#82a0ff;     /* foco acessível */
    --shadow:0 12px 28px rgba(2,6,23,.55);
    --radius:14px;
    --pill:#0c1f17;      /* pill do mais próximo */
  }

  /* Reset & base */
  *,*::before,*::after{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background:
      radial-gradient(1200px 1200px at 20% -20%, #111b3f 0%, transparent 50%) no-repeat,
      linear-gradient(180deg, #0b1020 0%, #0a0e1b 100%);
    color:var(--fg);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;
    line-height:1.35; -webkit-font-smoothing:antialiased;
  }

  /* Header minimal — apenas “ID GPS” */
  header{
    background:linear-gradient(90deg,var(--brand),var(--brand2));
    padding:16px 16px; box-shadow:var(--shadow)
  }
  .brand{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:12px}
  .dot-logo{width:12px;height:12px;border-radius:50%;background:#fff;opacity:.95}
  .brand h1{
    margin:0;font-weight:1000;letter-spacing:.06em;color:#0b1020;
    font-size:clamp(1rem,1.9vw,1.15rem);
  }

  /* Status (GPS + diagnóstico) */
  #status{max-width:1100px;margin:14px auto 0;display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:0 16px}
  .chip,.badge{
    display:inline-flex;align-items:center;gap:10px;border:1px solid var(--border);
    background:#0c1532;color:var(--muted);padding:10px 12px;border-radius:999px;font-weight:800;box-shadow:var(--shadow)
  }
  .dot{width:10px;height:10px;border-radius:50%}
  .ok .dot{background:var(--ok)}   .ok{color:#bbf7d0}
  .warn .dot{background:var(--warn)}.warn{color:#ffe7b0}
  .bad .dot{background:var(--bad)}  .bad{color:#fecaca}
  .badge{color:#c7d2fe}

  /* Cards */
  main{max-width:1100px;margin:14px auto 28px;display:grid;gap:16px;padding:0 16px}
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;
    box-shadow:0 6px 18px rgba(0,0,0,.35)
  }
  .card h2{margin:0 0 12px 0;font-size:clamp(1.05rem,1.8vw,1.1rem);color:#e7ecff}

  /* Ações */
  .actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  button{
    padding:14px 18px;font-size:clamp(.95rem,1.6vw,1.02rem);font-weight:900;border:0;border-radius:12px;color:#0b1020;
    cursor:pointer;transition:transform .08s ease, filter .15s ease;box-shadow:0 6px 18px rgba(0,0,0,.4)
  }
  button:active{transform:translateY(1px)}
  button:hover{filter:brightness(1.06)}
  button:disabled{opacity:.55;cursor:not-allowed;filter:none}
  #btnSend{background:var(--btn)}
  .opt{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:.95rem}
  .opt input[type="checkbox"]{width:16px;height:16px;accent-color:var(--brand)}
  .opt select{
    padding:10px 12px;border-radius:10px;border:1px solid var(--border);
    background:#0a122a;color:#e6ebff;font-weight:800;cursor:pointer
  }

  /* Lista / Distância (discreta) */
  ul{margin:0;padding:0;list-style:none;display:grid;gap:8px}
  li{
    line-height:1.3;font-family:ui-monospace,Consolas,Menlo,monospace;
    border:1px solid var(--border);border-radius:12px;padding:12px;background:#0b1433;
    font-size:1.03rem;color:#edf2ff; display:flex; justify-content:space-between; gap:12px; align-items:center;
    transition:box-shadow .15s ease,border-color .15s ease, background .15s ease
  }
  /* Destaque do MAIS PRÓXIMO */
  li.nearest{
    border-color:var(--btn);
    box-shadow:0 0 0 3px rgba(22,163,74,.2) inset;
    background:linear-gradient(0deg, rgba(22,163,74,.12), rgba(22,163,74,.02));
  }
  li.nearest .id-badge{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--pill);
    padding:4px 10px; border-radius:999px;
    outline:1px solid rgba(34,197,94,.3)
  }
  li.nearest .id-badge .id-label{
    font-weight:1000; letter-spacing:.02em; color:#b6ffce; font-size:1.08rem;
  }
  li.nearest .id-badge .flag{
    padding:2px 8px; border-radius:999px; background:#22c55e; color:#05220f; font-weight:900; font-size:.72rem;
  }

  .id-label{font-weight:800}
  .dist{
    color:#9fb0d9; opacity:.85;
    font-size:.78rem;   /* menor e discreta */
    min-width:64px; text-align:right;
  }

  /* Skeleton */
  .skeleton{
    height:48px;border-radius:12px;background:
      linear-gradient(90deg,#111a3a 25%,#0d1836 40%,#111a3a 60%);
    background-size:200% 100%;animation:shimmer 1.1s infinite
  }
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* Grid responsivo */
  .col-4{grid-column:span 4}
  .col-8{grid-column:span 8}
  @media (max-width:900px){ .col-4,.col-8{grid-column:1/-1} }

  /* Acessibilidade */
  button:focus-visible, select:focus-visible{outline:3px solid var(--focus); outline-offset:2px}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="dot-logo" aria-hidden="true"></span>
    <h1>ID GPS</h1>
  </div>
</header>

<!-- Status: GPS + diagnóstico -->
<div id="status" role="region" aria-label="Status do sistema">
  <div id="gpsChip" class="chip bad" aria-live="polite">
    <span class="dot"></span><span id="gpsText">GPS: aguardando…</span>
  </div>
  <div id="diag" class="badge" style="display:none" aria-live="polite">—</div>
</div>

<main>
  <div class="grid">
    <!-- Ações (principal) -->
    <section class="card col-4" aria-label="Ações">
      <h2>Ações</h2>

      <div class="actions" style="margin-bottom:8px">
        <button id="btnSend" disabled>Enviar ID por WhatsApp</button>
      </div>

      <div class="actions" style="gap:16px">
        <label class="opt" title="Quantidade de IDs a enviar (padrão 10)">
          <span style="opacity:.9">quantidade</span>
          <select id="qty">
            <option value="1">1</option>
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </label>

        <label class="opt" title="Adicionar links do Google Maps junto com os IDs">
          <input type="checkbox" id="chkMaps" />
          <span>incluir links de mapa</span>
        </label>
      </div>
    </section>

    <!-- IDs próximos -->
    <section class="card col-8" aria-label="IDs mais próximos">
      <h2>IDs próximos</h2>
      <ul id="list" aria-live="polite">
        <li class="skeleton"></li><li class="skeleton"></li><li class="skeleton"></li>
        <li class="skeleton"></li><li class="skeleton"></li>
      </ul>
    </section>
  </div>
</main>

<script>
/* ===== Config do chip (visual) ===== */
const ACC_GREEN=10, ACC_YELLOW=25;

/* ===== Estado ===== */
let dataset=[];           // {id,lat,lon}
let lastPos=null;         // {lat,lon,acc,spd,head,ts}
let lastRender=0;

/* ===== Elements ===== */
const gpsChip=document.getElementById('gpsChip');
const gpsText=document.getElementById('gpsText');
const diag=document.getElementById('diag');
const btnSend=document.getElementById('btnSend');
const chkMaps=document.getElementById('chkMaps');
const qtySel=document.getElementById('qty');
const listEl=document.getElementById('list');

/* ===== Helpers ===== */
function showDiag(msg){ diag.style.display='inline-flex'; diag.textContent=msg; }
function normalizeStr(s){ return String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9_ ]+/g,' ').replace(/\s+/g,' '); }
function findColumnIndex(headers, candidates){
  const map=headers.map(h=>normalizeStr(h));
  for(const c of candidates){ const i=map.indexOf(c); if(i>=0) return i; }
  for(const c of candidates){ for(let i=0;i<map.length;i++){ if(map[i].includes(c)) return i; } }
  return -1;
}
function parsePt(v){ if(v==null) return NaN; const s=String(v).trim(); return /,\d{1,}$/.test(s)? Number(s.replace(/\./g,'').replace(',','.')): Number(s); }
function hav(a,b,c,d){ const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180; const u=Math.sin(x/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2; return 2*R*Math.atan2(Math.sqrt(u),Math.sqrt(1-u)); }
function nearestN(lat,lon,n=10){
  if(!dataset.length) return [];
  const arr=dataset.map(p=>({id:p.id,lat:p.lat,lon:p.lon,d:hav(lat,lon,p.lat,p.lon)}));
  arr.sort((a,b)=>a.d-b.d);
  return arr.slice(0, Math.min(n,arr.length));
}
function fmtAcc(a){ return (a==null||!Number.isFinite(a))?'—':('±'+Math.round(a)+' m'); }
function fmtHead(h){ return (h==null||!Number.isFinite(h))? null : Math.round(h)+'°'; }
function fmtSpd(s){ return (s==null||!Number.isFinite(s))? null : Math.round(s*3.6)+' km/h'; }
function nowBR(){ return new Date().toLocaleString('pt-BR'); }

/* Distância — sempre em metros (discreta) */
function fmtDistMeters(m){
  if(!(Number.isFinite(m))) return '—';
  return Math.round(m) + ' m';
}

/* ===== Chip e botões ===== */
function updateGpsChip(){
  if(!lastPos || lastPos.acc==null){ gpsChip.className='chip bad'; gpsText.textContent='GPS: buscando…'; return; }
  const a=Math.round(lastPos.acc);
  if(a<=ACC_GREEN){ gpsChip.className='chip ok';   gpsText.textContent=`GPS: OK (${fmtAcc(a)})`; }
  else if(a<=ACC_YELLOW){ gpsChip.className='chip warn'; gpsText.textContent=`GPS: ajustando (${fmtAcc(a)})`; }
  else { gpsChip.className='chip bad';  gpsText.textContent=`GPS: fraco (${fmtAcc(a)})`; }
}
function updateButtons(){
  const baseOk=dataset.length>0, posOk=!!lastPos;
  btnSend.disabled=!(baseOk && posOk);
}

/* ===== CSV Loader ===== */
async function loadCSV(){
  try{
    let resp=await fetch('dados.csv?v='+Date.now(), {cache:'no-store'});
    if(!resp.ok){ resp=await fetch('Dados_Completos_Grupo_2_all.csv?v='+Date.now(), {cache:'no-store'}); }
    if(!resp.ok){ showDiag('❌ CSV não encontrado'); return; }

    let text=await resp.text(); if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
    const lines=text.split(/\r?\n/).filter(l=>l.trim()!==''); if(lines.length<2){ showDiag('❌ CSV vazio'); return; }

    const head=lines.shift().split(';');
    const iId=findColumnIndex(head,['id do nox','idnox','id']),
          iLat=findColumnIndex(head,['latitude','lat']),
          iLon=findColumnIndex(head,['longitude','lon','long']);
    if(iId<0||iLat<0||iLon<0){ showDiag('❌ Cabeçalho inválido (ID/Latitude/Longitude)'); return; }

    dataset=lines.map(l=>{ const r=l.split(';'); return {id:String(r[iId]||'').trim(), lat:parsePt(r[iLat]), lon:parsePt(r[iLon])}; })
                 .filter(p=>p.id && Number.isFinite(p.lat)&&Number.isFinite(p.lon));
    if(!dataset.length){ showDiag('❌ Sem pontos válidos no CSV'); return; }

    render(true); updateButtons();
  }catch(e){ showDiag('❌ Erro ao carregar CSV'); }
}

/* ===== Render IDs (com distância — metros) ===== */
function render(force=false){
  const now=performance.now(); if(!force && now-lastRender<150) return; lastRender=now;
  listEl.innerHTML=''; if(!lastPos||!dataset.length) return;

  const qty = Number(qtySel.value || 10);
  const items=nearestN(lastPos.lat,lastPos.lon,qty);
  if(!items.length){ listEl.innerHTML='<li>—</li>'; return; }

  const frag=document.createDocumentFragment();
  items.forEach((o,idx)=>{
    const li=document.createElement('li');

    /* lado esquerdo: ID (com badge se for o mais próximo) */
    const left = document.createElement('span');
    const idSpan = document.createElement('span');
    idSpan.className='id-label';
    idSpan.textContent=o.id;

    if(idx===0){
      li.classList.add('nearest');
      const pill = document.createElement('span');
      pill.className='id-badge';
      const flag = document.createElement('span');
      flag.className='flag';
      flag.textContent='PRÓXIMO';
      pill.appendChild(idSpan);
      pill.appendChild(flag);
      left.appendChild(pill);
    }else{
      left.appendChild(idSpan);
    }

    /* lado direito: distância discreta */
    const right = document.createElement('span');
    right.className='dist';
    right.textContent = fmtDistMeters(o.d);

    li.appendChild(left);
    li.appendChild(right);
    frag.appendChild(li);
  });
  listEl.appendChild(frag);
}

/* ===== GPS ===== */
function startGPS(){
  if(!('geolocation' in navigator)){ showDiag('❌ Sem geolocalização no navegador'); return; }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      lastPos={ lat:pos.coords.latitude, lon:pos.coords.longitude, acc:pos.coords.accuracy,
                spd:pos.coords.speed, head:pos.coords.heading, ts:Date.now() };
      updateGpsChip(); updateButtons(); render(true);
      navigator.geolocation.watchPosition(p=>{
        lastPos={ lat:p.coords.latitude, lon:p.coords.longitude, acc:p.coords.accuracy,
                  spd:p.coords.speed, head:p.coords.heading, ts:Date.now() };
        updateGpsChip(); updateButtons(); render();
      },err=>{}, {enableHighAccuracy:true,maximumAge:0,timeout:15000});
    },
    err=>{ showDiag('❗ Permita o GPS para listar os IDs próximos'); },
    {enableHighAccuracy:true,maximumAge:0,timeout:10000}
  );
}

/* ===== Enviar (IDs) ===== */
btnSend.addEventListener('click', ()=>{
  if(!lastPos) return;
  const qty = Number(qtySel.value || 10);
  const items=nearestN(lastPos.lat,lastPos.lon,qty); if(!items.length) return;

  const accTxt=fmtAcc(lastPos.acc), head=fmtHead(lastPos.head), spd=fmtSpd(lastPos.spd);
  let tx=`${nowBR()}\nGPS agora: Lat ${lastPos.lat.toFixed(6)}, Lon ${lastPos.lon.toFixed(6)} · Precisão ${accTxt}`;
  if(spd) tx+=` · Vel ${spd}`; if(head) tx+=` · Curso ${head}`; tx+='\n';

  // Padrão: somente IDs (sem distâncias)
  items.forEach(o=> tx+=`ID: ${o.id}\n`);

  // Opcional: links de mapa
  if(chkMaps.checked){
    tx+='\nLinks de mapa:\n';
    items.forEach(o=> tx+=`ID: ${o.id} → https://maps.google.com/?q=${o.lat.toFixed(6)},${o.lon.toFixed(6)}\n`);
  }

  window.open('https://wa.me/?text='+encodeURIComponent(tx),'_blank');
});

/* ===== Eventos ===== */
qtySel.addEventListener('change', ()=> render(true));

/* ===== Boot ===== */
(function boot(){
  loadCSV();
  startGPS();
})();
</script>
</body>
</html>
